<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_PSY04 — La crise d'angoisse : rester ancré</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#f97316;--acc-d:#c2410c;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,#f9731622 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_PSY04';
var CERT_KEY  = 'CERT_AED_AED_PSY04';
var BACK_URL  = 'index.html';

var INTRO = {
  "pillar": "Santé Psychique · Module 4/5",
  "pos": "Gestion de crise émotionnelle",
  "title": "La crise d'angoisse : rester ancré",
  "quote": "Face à la tempête émotionnelle, votre calme est le seul phare. Pas vos mots — votre état.",
  "p1": "Une crise d'angoisse aiguë chez un adolescent peut être spectaculaire : hyperventilation, tremblements, pleurs incontrôlables, sentiment de mort imminente. Pour quelqu'un qui n'y est pas préparé, c'est déstabilisant. Ce module vous donne les protocoles d'ancrage validés par la recherche pour traverser ces moments avec l'élève — sans les aggraver.",
  "p2": "Règle d'or : votre propre calme est l'intervention principale. La régulation émotionnelle est contagieuse — dans les deux sens. Un adulte qui panique face à une crise amplifie la crise. Un adulte ancré l'aide à se terminer.",
  "refs": "Siegel, La fenêtre de tolérance — Technique d'ancrage 5-4-3-2-1 (Grounding) — Méthode de respiration carrée — Réseau Canope, protocole de gestion d'un élève en crise — SMHO, conseils au personnel scolaire"
};

var SCENARIOS = [
  {
    "ctx": "En permanence, Aya (5e) commence à hyperventiler. Elle se lève brusquement, ses mains tremblent, elle murmure 'j'arrive plus à respirer'. Les autres élèves regardent, certains rigolent nerveusement.",
    "q": "Quelles sont vos deux premières actions ?",
    "options": [
      {
        "label": "Isoler + voix calme + respiration",
        "text": "Je m'approche calmement d'Aya et je dis aux autres élèves, d'une voix ferme et neutre : 'Reprenez votre travail.' Je l'accompagne dans un coin ou un espace adjacent. Je m'accroupis à sa hauteur et je dis : 'Aya, regarde-moi. Tu es en sécurité. On va respirer ensemble. Inspire avec moi... lentement... expire...' Je respire avec elle, lentement.",
        "score": 3,
        "fb": "Les deux premières actions sont : (1) retirer le regard des pairs — la pression du groupe aggrave l'angoisse — et (2) descendre à la hauteur de l'élève pour réduire l'effet d'autorité et créer une connexion physique calme. Respirer ensemble (co-régulation) est une technique validée : le cerveau du patient va naturellement synchroniser son rythme sur celui de l'adulte calme. Votre respiration lente est l'intervention.",
        "good": true
      },
      {
        "label": "Appeler immédiatement l'infirmière",
        "text": "Je prends mon téléphone et j'appelle l'infirmière tout en restant avec Aya.",
        "score": 1,
        "fb": "Prévenir l'infirmière est utile, mais ce n'est pas la première action. Pendant les premières minutes d'une crise d'angoisse aiguë, votre présence et votre calme sont la principale intervention. Appeler tout de suite peut aussi augmenter l'affolement d'Aya (elle voit un adulte qui 'appelle à l'aide'). Stabilisez d'abord, alertez ensuite si besoin.",
        "good": false
      },
      {
        "label": "Lui parler pour comprendre la cause",
        "text": "'Aya, qu'est-ce qui se passe ? Qu'est-ce qui t'a mise dans cet état ?'",
        "score": 0,
        "fb": "Chercher la cause pendant la crise est contre-productif. Quand le cortex préfrontal est débordé par l'angoisse, l'élève n'est pas en capacité de réfléchir et verbaliser. La question augmente la pression. En crise aiguë, la priorité est l'ancrage sensoriel et la régulation physique — pas la compréhension verbale.",
        "good": false
      }
    ]
  },
  {
    "ctx": "La respiration d'Aya se stabilise un peu. Mais elle pleure toujours et semble encore très agitée. Vous êtes dans un espace calme. Elle dit : 'Je sais même pas pourquoi ça m'arrive, je suis nulle.'",
    "q": "Vous utilisez une technique d'ancrage. Laquelle ?",
    "options": [
      {
        "label": "Ancrage 5-4-3-2-1 (sensoriel)",
        "text": "'Aya, on va faire quelque chose ensemble. Dis-moi 5 choses que tu vois en ce moment, dans cette pièce.' Je l'aide à nommer. '4 choses que tu peux toucher.' Je lui touche doucement le dos de la main sur la chaise. '3 choses que tu entends...' On continue.",
        "score": 3,
        "fb": "La technique d'ancrage 5-4-3-2-1 (ou Grounding) mobilise les cinq sens pour ramener l'attention dans le présent sensoriel et couper le circuit de rumination anxieuse. Elle est validée dans les protocoles de gestion du stress post-traumatique et des crises d'angoisse. Elle est simple, ne nécessite aucun matériel, et fonctionne même quand les mots sont difficiles.",
        "good": true
      },
      {
        "label": "La rassurer sur sa valeur",
        "text": "'T'es pas nulle du tout, Aya. Tout le monde peut avoir des crises d'angoisse. C'est pas grave.'",
        "score": 1,
        "fb": "La réassurance émotionnelle est utile, mais pendant la crise, l'objectif est d'abord d'ancrer le système nerveux dans le présent sensoriel avant de traiter le contenu émotionnel. 'C'est pas grave' peut aussi minimiser ce qu'elle vit. 'C'est difficile, et tu t'en sors bien' serait plus juste.",
        "good": false
      },
      {
        "label": "Lui demander de compter jusqu'à 100",
        "text": "'Compte jusqu'à 100 lentement, ça va te calmer.'",
        "score": 0,
        "fb": "Compter peut être une distraction légère mais n'est pas un protocole d'ancrage validé. L'activité mentale abstraite (compter) engage moins le corps que l'ancrage sensoriel, et peut être trop difficile à réaliser quand le cortex préfrontal est encore débordé.",
        "good": false
      }
    ]
  },
  {
    "ctx": "Aya va mieux. Elle renifle, s'essuie les yeux. Elle demande si elle peut retourner en cours. Il reste 20 minutes. Ses camarades l'ont vue partir en crise.",
    "q": "Comment gérez-vous le retour d'Aya dans le groupe ?",
    "options": [
      {
        "label": "Proposer un retour progressif avec filet de sécurité",
        "text": "'Tu n'es pas obligée d'y aller maintenant. Si tu veux y retourner, je peux prévenir ton professeur discrètement. Et si à un moment ça redevient difficile, tu as le droit de demander à sortir un instant. Tu connais ta limite mieux que personne.'",
        "score": 3,
        "fb": "Cette réponse fait trois choses : elle respecte l'autonomie d'Aya en lui laissant le choix, elle anticipe les possibles regards des camarades en proposant une coordination discrète avec le professeur, et elle lui donne une 'porte de sortie' — ce qui paradoxalement diminue l'anxiété de performance liée au retour. Le sentiment d'avoir un contrôle réduit la probabilité d'une nouvelle crise.",
        "good": true
      },
      {
        "label": "La renvoyer directement en cours",
        "text": "'Si tu te sens mieux, c'est bien de retourner en cours. Allez, vas-y.'",
        "score": 0,
        "fb": "Renvoyer trop vite sans filet de sécurité peut déclencher une nouvelle montée d'angoisse liée au regard des pairs. Aya a besoin d'un plan — pas d'une injonction. La question n'est pas 'peux-tu y retourner ?' mais 'comment on fait pour que ça se passe bien ?'",
        "good": false
      },
      {
        "label": "La garder en permanence pour le reste du cours",
        "text": "'Reste là jusqu'à la fin du cours. T'es mieux ici.'",
        "score": 1,
        "fb": "Rester est une option légitime, mais l'imposer sans demander peut renforcer le sentiment d'Aya d'être 'différente' ou 'fragile'. Lui laisser le choix — avec les informations nécessaires pour décider — est plus respectueux et plus efficace.",
        "good": false
      }
    ]
  }
];

var SYNTHESIS = [
  {
    "icon": "🌬️",
    "t": "Co-régulation :",
    "v": "Votre calme est l'intervention. Respirez lentement — le cerveau de l'élève se synchronise sur le vôtre."
  },
  {
    "icon": "👁️",
    "t": "Ancrage 5-4-3-2-1 :",
    "v": "5 choses vues, 4 touchées, 3 entendues, 2 senties, 1 goûtée. Ramène l'attention dans le présent sensoriel."
  },
  {
    "icon": "🚫",
    "t": "Ce qui aggrave :",
    "v": "Chercher la cause pendant la crise, minimiser ('c'est pas grave'), regard du groupe non géré."
  },
  {
    "icon": "🔙",
    "t": "Le retour :",
    "v": "Toujours donner le choix du retour. Toujours prévoir une porte de sortie. Le contrôle réduit l'angoisse."
  }
];


function getPlayer(){
  try{var u=new URLSearchParams(window.location.search),p=u.get('player');
    if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);localStorage.setItem('pvs_aed_player',p);return p;}}catch(ex){}
  return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';
}
function awardXP(){
  try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : La crise d'angoisse : rester ancré',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){
    var p=getPlayer(),sep=BACK_URL.indexOf('?')===-1?'?':'&';
    window.location.href=(p&&p!=='anonyme')?BACK_URL+sep+'player='+encodeURIComponent(p):BACK_URL;
  };
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},INTRO.pillar+' \u00B7 '+INTRO.pos),
    e('h1',null,INTRO.title),
    e('p',{className:'quote'},'"'+INTRO.quote+'"'),
    e('p',null,INTRO.p1),
    e('p',null,INTRO.p2),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00E9f\u00E9rences : '),INTRO.refs),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +85 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Ancrage'),e('div',{className:'comp-earn'},'+Crise'),null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00E9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00E9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00E9e':'\u26A0\uFE0F Point d\u2019am\u00E9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00E9nario suivant \u2192':'Synth\u00E8se \u2192'))
    );};

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00E9tence solide.":pc>=50?"Des r\u00E9flexes \u00E0 affiner.":"\u00C0 retravailler en \u00E9quipe.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00E8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );};

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'⚓'),
    e('h1',null,"Module valid\u00E9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00E9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +85 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Ancrage émotionnel'),e('div',{className:'comp-earn'},'+1 Gestion de crise'),null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00E0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
