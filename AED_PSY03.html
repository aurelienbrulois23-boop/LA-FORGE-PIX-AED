<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_PSY03 — Que dire quand un élève se confie : postures verbales</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#10b981;--acc-d:#059669;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,#10b98122 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_PSY03';
var CERT_KEY  = 'CERT_AED_AED_PSY03';
var BACK_URL  = 'index.html';

var INTRO = {
  "pillar": "Santé Psychique · Module 3/5",
  "pos": "Postures verbales & Écoute",
  "title": "Que dire quand un élève se confie : postures verbales",
  "quote": "L'écoute active ne consiste pas à donner des conseils. C'est aider l'autre à verbaliser pour alléger ce qu'il porte.",
  "p1": "Quand un élève se confie, la qualité de votre réponse dans les premières secondes peut tout changer : il peut se sentir compris et continuer à parler, ou se fermer pour longtemps. Ce module vous entraîne sur les formulations verbales qui ouvrent et celles qui ferment — sur la posture d'écoute active, la validation émotionnelle, et le paradoxe du secret.",
  "p2": "Vous n'êtes pas thérapeute. Vous n'avez pas à résoudre. Vous avez à recevoir, à reformuler, à orienter. Et à rester honnête sur ce que vous pouvez et ne pouvez pas promettre.",
  "refs": "Gordon, L'écoute active avec les ados — HAS, Manifestations dépressives à l'adolescence — PSSM France, méthode AÉRER — Marshall Rosenberg, CNV"
};

var SCENARIOS = [
  {
    "ctx": "Inès (3e) reste après la permanence et vous dit : 'Je sais pas, j'ai l'impression que personne me voit. Que je pourrais disparaître et ça changerait rien.' Elle a l'air épuisée.",
    "q": "Quelle est votre première réponse ?",
    "options": [
      {
        "label": "Reformulation + ouverture",
        "text": "'Je t'entends, Inès. Tu as l'impression d'être invisible, que ta présence ne compte pas pour les autres. C'est un sentiment très lourd à porter. Tu peux me dire depuis quand tu ressens ça ?'",
        "score": 3,
        "fb": "Cette réponse fait trois choses essentielles : elle valide l'émotion sans la minimiser ('c'est très lourd à porter'), elle reformule pour montrer qu'on a entendu, et elle ouvre par une question qui invite à continuer sans forcer. Le mot 'disparaître' est aussi à ne pas laisser passer sans s'assurer qu'il ne recouvre pas une idée suicidaire — la question 'depuis quand' permet aussi de sonder cette profondeur progressivement.",
        "good": true
      },
      {
        "label": "Réassurance rapide",
        "text": "'Mais non, Inès ! Bien sûr que tu comptes ! On te voit, nous. T'es une super fille !'",
        "score": 0,
        "fb": "La réassurance immédiate, bien qu'intentionnée, invalide l'émotion. Elle dit implicitement : 'ce que tu ressens est faux'. L'élève qui se sent invisible n'a pas besoin d'un démenti — elle a besoin d'être entendue dans sa douleur. La CNV appelle ça la 'fausse consolation' : elle ferme le dialogue au lieu de l'ouvrir.",
        "good": false
      },
      {
        "label": "Orientation immédiate",
        "text": "'Tu devrais en parler à l'infirmière ou à la psy. C'est leur rôle, pas le mien.'",
        "score": 1,
        "fb": "Orienter vers les professionnels est juste et nécessaire — mais pas comme première réponse. Cette formulation dit à l'élève qui vient de se confier : 'je ne suis pas la bonne personne'. Elle peut se fermer et ne plus parler à personne. Restez présent d'abord, écoutez, puis orientez en restant impliqué : 'Je suis là, et je pense aussi qu'il serait bien d'en parler à l'infirmière — on peut y aller ensemble si tu veux.'",
        "good": false
      }
    ]
  },
  {
    "ctx": "Tom (4e) vous confie qu'il vomit après les repas depuis plusieurs semaines, et vous demande de ne rien dire. 'Promis que tu dirais rien ?'",
    "q": "Comment répondez-vous à cette demande de secret ?",
    "options": [
      {
        "label": "Secret partiel — honnêteté sur la limite",
        "text": "'Je ne dirai rien à tes camarades. Mais Tom, ce que tu me décris — les vomissements depuis des semaines — c'est un signal que ton corps envoie et que je ne peux pas ignorer. Je dois en parler à l'infirmière, pas pour te trahir, mais parce que ta santé est en jeu. Et je reste là, je te laisse pas seul avec ça. Tu veux qu'on y aille ensemble ?'",
        "score": 3,
        "fb": "Cette réponse est honnête sur la limite du secret sans rompre brutalement la confiance. Elle distingue le secret avec les pairs (que vous pouvez tenir) du signalement aux adultes de santé (que vous ne pouvez pas promettre de ne pas faire). Elle recadre le signalement comme un acte de soin, pas de trahison. Et elle maintient la relation : 'je reste là'.",
        "good": true
      },
      {
        "label": "Promettre le secret pour garder la confiance",
        "text": "'D'accord, je ne dis rien. C'est entre toi et moi.'",
        "score": 0,
        "fb": "Promettre le secret absolu est une erreur déontologique et relationnelle. Des vomissements provoqués sur plusieurs semaines peuvent signaler un trouble du comportement alimentaire grave — des complications médicales sérieuses peuvent survenir. Si vous promettrz et ne tenez pas (ce qui arrivera si la situation s'aggrave), la rupture de confiance sera totale. Ne promettez jamais ce que vous ne pouvez pas tenir.",
        "good": false
      },
      {
        "label": "Signaler immédiatement sans en parler à Tom",
        "text": "Je transmets l'information à l'infirmière sans en dire davantage à Tom.",
        "score": 1,
        "fb": "Signaler est juste, mais le faire sans en informer Tom d'abord crée une rupture de confiance importante. L'élève doit savoir ce que vous faites et pourquoi. Agir dans son dos — même pour son bien — peut l'empêcher de se confier à nouveau à un adulte. La transparence est une condition du lien.",
        "good": false
      }
    ]
  },
  {
    "ctx": "Après avoir transmis la situation de Tom à l'infirmière, vous le croisez le lendemain dans le couloir. Il vous regarde, l'air fermé. Vous voyez qu'il sait que vous avez parlé.",
    "q": "Comment gérez-vous ce moment ?",
    "options": [
      {
        "label": "Aller vers lui — maintenir le lien",
        "text": "'Tom.' Je m'arrête. 'Je sais que tu es en colère contre moi. C'est normal. J'avais dit que j'allais en parler et je l'ai fait — pas pour t'avoir, mais parce que j'avais pas le choix. Je suis toujours là si tu veux parler. Et tu n'es pas obligé de me pardonner tout de suite.'",
        "score": 3,
        "fb": "Cette réponse est fondamentale et souvent oubliée dans les protocoles : l'après-signalement. Vous avez fait votre devoir professionnel. Maintenant, la relation existe encore — et elle mérite d'être maintenue. Reconnaître sa colère sans se défendre ('c'est normal'), expliquer sans s'excuser ('j'avais pas le choix'), et maintenir la porte ouverte. C'est ça, rester un adulte fiable même quand ça coûte quelque chose.",
        "good": true
      },
      {
        "label": "Éviter le sujet pour ne pas aggraver",
        "text": "Je lui souris normalement et je n'aborde pas le sujet — pour ne pas raviver la tension.",
        "score": 1,
        "fb": "Faire comme si rien ne s'était passé peut être perçu par Tom comme de l'indifférence ou de la mauvaise conscience. Un sourire 'normal' dans ce contexte peut sembler creux. Nommer la situation — avec pudeur et simplicité — montre que vous ne l'évitez pas et que vous assumez votre acte.",
        "good": false
      },
      {
        "label": "Se justifier longuement",
        "text": "'Tom, écoute, j'avais vraiment pas le choix, c'est le règlement, tu comprends, l'infirmière devait être au courant, c'est pour ton bien...'",
        "score": 0,
        "fb": "La justification longue et défensive envoie le signal que vous vous sentez coupable — et elle met Tom dans la position de devoir vous rassurer, lui. C'est une inversion de rôle malvenue. Soyez bref, honnête, et ouvert. Pas besoin d'un plaidoyer.",
        "good": false
      }
    ]
  }
];

var SYNTHESIS = [
  {
    "icon": "👂",
    "t": "La reformulation :",
    "v": "'Si je comprends bien...' valide l'émotion et montre qu'on a entendu. C'est la base de l'écoute active."
  },
  {
    "icon": "🚫",
    "t": "La réassurance immédiate :",
    "v": "'Mais non, ça va aller !' ferme le dialogue. Validez d'abord, puis orientez."
  },
  {
    "icon": "🔑",
    "t": "Le paradoxe du secret :",
    "v": "Ne promettez jamais ce que vous ne pouvez pas tenir. Soyez honnête sur la limite : confidentialité avec les pairs, pas avec les adultes de santé."
  },
  {
    "icon": "🔗",
    "t": "L'après-signalement :",
    "v": "Votre rôle ne s'arrête pas au signalement. Rester présent — même en cas de colère de l'élève — c'est rester un adulte fiable."
  }
];


function getPlayer(){
  try{var u=new URLSearchParams(window.location.search),p=u.get('player');
    if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);localStorage.setItem('pvs_aed_player',p);return p;}}catch(ex){}
  return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';
}
function awardXP(){
  try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : Que dire quand un élève se confie : postures verbales',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){
    var p=getPlayer(),sep=BACK_URL.indexOf('?')===-1?'?':'&';
    window.location.href=(p&&p!=='anonyme')?BACK_URL+sep+'player='+encodeURIComponent(p):BACK_URL;
  };
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},INTRO.pillar+' \u00B7 '+INTRO.pos),
    e('h1',null,INTRO.title),
    e('p',{className:'quote'},'"'+INTRO.quote+'"'),
    e('p',null,INTRO.p1),
    e('p',null,INTRO.p2),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00E9f\u00E9rences : '),INTRO.refs),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +90 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Écoute'),e('div',{className:'comp-earn'},'+Posture'),null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00E9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00E9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00E9e':'\u26A0\uFE0F Point d\u2019am\u00E9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00E9nario suivant \u2192':'Synth\u00E8se \u2192'))
    );};

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00E9tence solide.":pc>=50?"Des r\u00E9flexes \u00E0 affiner.":"\u00C0 retravailler en \u00E9quipe.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00E8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );};

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'💬'),
    e('h1',null,"Module valid\u00E9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00E9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +90 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Écoute active'),e('div',{className:'comp-earn'},'+1 Posture verbale'),null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00E0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
