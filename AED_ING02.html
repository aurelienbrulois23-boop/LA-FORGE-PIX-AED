<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_ING02 \u2014 Motivation : de l\u2019XP \u00e0 la joie intrins\u00e8que</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#e2a84b;--acc-d:#c48530;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(226,168,75,.06) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_ING02';
var CERT_KEY  = 'CERT_AED_AED_ING02';
var BACK_URL  = 'index_PIX_AED.html';

var SCENARIOS = [
  {
    ctx: "Vous remarquez qu\\u2019un \\u00e9l\\u00e8ve de 5\\u00e8me, Th\\u00e9o, a accumul\\u00e9 beaucoup d\\u2019XP mais uniquement en faisant des t\\u00e9moignages bidons pour ses copains. Il t\\u00e9moigne que \\u00abMathis a aid\\u00e9 un 6\\u00e8me\\u00bb alors que Mathis n\\u2019a rien fait.",
    q: "Comment g\\u00e9rez-vous cette triche ?",
    options: [
      {
        label: "Retrait discret + discussion",
        text: "Je signale au CPE pour retrait des XP frauduleux (Shadow XP). Puis je vois Th\\u00e9o en priv\\u00e9 : \\u00abJe comprends l\\u2019id\\u00e9e \\u2014 tu veux gagner des points. Mais le syst\\u00e8me repose sur la confiance. Si les t\\u00e9moignages sont bidons, le syst\\u00e8me ne vaut plus rien pour personne. Tu veux des vrais XP ? Fais un vrai truc.\\u00bb",
        score: 3,
        fb: "La triche r\\u00e9v\\u00e8le que Th\\u00e9o est encore en motivation extrins\\u00e8que pure (les points). L\\u2019objectif n\\u2019est pas de le punir mais de le faire passer \\u00e0 l\\u2019\\u00e9tape suivante : comprendre que la valeur du syst\\u00e8me repose sur l\\u2019authenticit\\u00e9. Le Shadow XP corrige sans humilier.",
        good: true
      },
      {
        label: "D\\u00e9nonciation publique",
        text: "\\u00abTh\\u00e9o triche, tout le monde le sait. Ses points sont retir\\u00e9s.\\u00bb",
        score: 0,
        fb: "L\\u2019exposition publique d\\u00e9truit la motivation de Th\\u00e9o ET la confiance des autres dans le syst\\u00e8me. Le Shadow XP est con\\u00e7u pr\\u00e9cis\\u00e9ment pour corriger dans l\\u2019ombre. La honte n\\u2019enseigne rien.",
        good: false
      },
      {
        label: "Laisser faire",
        text: "\\u00c7a se r\\u00e9gulera tout seul, les autres finiront par le griller.",
        score: 1,
        fb: "La triche non corrig\\u00e9e envoie un signal : le syst\\u00e8me n\\u2019est pas s\\u00e9rieux. Si les faux t\\u00e9moignages passent, pourquoi faire de vrais actes ? L\\u2019absence de correction tue la cr\\u00e9dibilit\\u00e9 du dispositif.",
        good: false
      },
    ]
  },
  {
    ctx: "Une \\u00e9l\\u00e8ve de 4\\u00e8me, Leila, qui \\u00e9tait tr\\u00e8s motiv\\u00e9e par les XP au d\\u00e9but, semble s\\u2019en d\\u00e9sint\\u00e9resser. Elle continue pourtant \\u00e0 aider ses camarades spontan\\u00e9ment.",
    q: "Est-ce un probl\\u00e8me ?",
    options: [
      {
        label: "Non \\u2014 c\\u2019est le succ\\u00e8s du syst\\u00e8me",
        text: "\\u00abC\\u2019est exactement ce qu\\u2019on veut. Leila est pass\\u00e9e de la motivation extrins\\u00e8que (XP) \\u00e0 la motivation intrins\\u00e8que (plaisir d\\u2019aider). L\\u2019XP a fait son travail d\\u2019\\u00e9tayage \\u2014 il peut s\\u2019effacer.\\u00bb",
        score: 3,
        fb: "C\\u2019est le sc\\u00e9nario id\\u00e9al de Favre : l\\u2019amorce extrins\\u00e8que (XP) a \\u00e9veill\\u00e9 le plaisir du lien social (ocytocine). Le syst\\u00e8me nerveux de Leila a appris que l\\u2019aide \\u00e0 l\\u2019autre est gratifiante en soi. Mission accomplie.",
        good: true
      },
      {
        label: "La remotiver avec des bonus",
        text: "\\u00abOn pourrait lui donner des badges sp\\u00e9ciaux pour la relancer.\\u00bb",
        score: 1,
        fb: "Ajouter des r\\u00e9compenses \\u00e0 quelqu\\u2019un d\\u00e9j\\u00e0 intrins\\u00e8quement motiv\\u00e9, c\\u2019est l\\u2019effet de sur-justification (Lepper, 1973) : \\u00e7a peut D\\u00c9TRUIRE la motivation intrins\\u00e8que en la rempla\\u00e7ant par de l\\u2019extrins\\u00e8que.",
        good: false
      },
      {
        label: "S\\u2019inqui\\u00e9ter",
        text: "\\u00abSi elle ne s\\u2019int\\u00e9resse plus aux XP, le syst\\u00e8me a \\u00e9chou\\u00e9 pour elle.\\u00bb",
        score: 0,
        fb: "Au contraire ! Si l\\u2019\\u00e9l\\u00e8ve n\\u2019a plus besoin des points pour \\u00eatre prosociale, c\\u2019est que le syst\\u00e8me a parfaitement fonctionn\\u00e9. L\\u2019objectif n\\u2019est pas que les \\u00e9l\\u00e8ves restent accros aux XP \\u2014 c\\u2019est qu\\u2019ils n\\u2019en aient plus besoin.",
        good: false
      },
    ]
  },
  {
    ctx: "En formation AED, un coll\\u00e8gue demande : \\u00abC\\u2019est quoi la diff\\u00e9rence entre motivation intrins\\u00e8que et extrins\\u00e8que, concr\\u00e8tement ?\\u00bb",
    q: "Comment l\\u2019expliquez-vous simplement ?",
    options: [
      {
        label: "Analogie concr\\u00e8te",
        text: "\\u00abExtrins\\u00e8que, c\\u2019est courir parce qu\\u2019on te promet un g\\u00e2teau \\u00e0 l\\u2019arriv\\u00e9e. Intrins\\u00e8que, c\\u2019est courir parce que tu aimes courir. Le Super-Hub, c\\u2019est comme dire \\u00e0 un gamin qui n\\u2019a jamais couru : \\u2018tiens, un g\\u00e2teau si tu cours 100m\\u2019. Il court, et il d\\u00e9couvre qu\\u2019il aime \\u00e7a. Apr\\u00e8s, il court m\\u00eame sans g\\u00e2teau.\\u00bb",
        score: 3,
        fb: "L\\u2019analogie rend le concept imm\\u00e9diatement compr\\u00e9hensible. L\\u2019XP est le g\\u00e2teau : il ne cr\\u00e9e pas le plaisir de courir, il cr\\u00e9e l\\u2019occasion de le d\\u00e9couvrir. C\\u2019est l\\u2019\\u00e9tayage transitionnel de Favre en une phrase.",
        good: true
      },
      {
        label: "D\\u00e9finition acad\\u00e9mique",
        text: "\\u00abDeci et Ryan (1985) d\\u00e9finissent la motivation intrins\\u00e8que comme...\\u00bb",
        score: 1,
        fb: "Correct sur le fond, mais entre AED en formation, le jargon acad\\u00e9mique \\u00e9teint la compr\\u00e9hension. L\\u2019analogie vivante transmet mieux que la d\\u00e9finition.",
        good: false
      },
      {
        label: "Simplification excessive",
        text: "\\u00abExtrins\\u00e8que = r\\u00e9compense, intrins\\u00e8que = pas de r\\u00e9compense.\\u00bb",
        score: 1,
        fb: "Trop simplifi\\u00e9 : la motivation intrins\\u00e8que N\\u2019EST PAS l\\u2019absence de r\\u00e9compense \\u2014 c\\u2019est la pr\\u00e9sence d\\u2019une r\\u00e9compense interne (plaisir, sentiment de comp\\u00e9tence, lien social). Il y a r\\u00e9compense dans les deux cas \\u2014 la source change.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"\u{1F36C}", t:"\\u00c9tayage transitionnel :", v:"L\\u2019XP est l\\u2019amorce, pas la fin. Le syst\\u00e8me nerveux d\\u00e9couvre le plaisir social \\u00e0 travers l\\u2019acte amorcé par les points."},
  {icon:"\u26A0\uFE0F", t:"Effet de sur-justification :", v:"R\\u00e9compenser quelqu\\u2019un d\\u00e9j\\u00e0 motiv\\u00e9 intrins\\u00e8quement peut d\\u00e9truire cette motivation. Ne pas forcer les XP sur ceux qui n\\u2019en ont plus besoin."},
  {icon:"\u{1F575}", t:"Rep\\u00e9rer la triche :", v:"La triche signal\\u00e9 que l\\u2019\\u00e9l\\u00e8ve est bloqu\\u00e9 en extrins\\u00e8que. Shadow XP + discussion \\u2014 pas humiliation."},
  {icon:"\u{1F3C6}", t:"Le vrai succ\\u00e8s :", v:"Un \\u00e9l\\u00e8ve qui aide sans regarder ses points a d\\u00e9pass\\u00e9 le syst\\u00e8me. C\\u2019est la victoire."},
];


function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function awardXP(){
  try{
    var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : Motivation : de l\\u2019XP \\u00e0 la joie intrins\\u00e8que',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){window.location.href=BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Ing\u00e9nierie de la Bienveillance \u00B7 Module 1/5'),
    e('h1',null,"Motivation : de l\\u2019XP \\u00e0 la joie intrins\\u00e8que"),
    e('p',{className:'quote'},'"'+"La carotte et le b\\u00e2ton fonctionnent. Jusqu\\u2019au jour o\\u00f9 il n\\u2019y a plus de carotte."+'" \u2014 Daniel Favre'),
    e('p',null,"Le pi\\u00e8ge classique de la gamification : les \\u00e9l\\u00e8ves font les choses pour les points, puis arr\\u00eatent d\\u00e8s que les points disparaissent. C\\u2019est le b\\u00e9haviorisme pur \\u2014 conditionnement par r\\u00e9compense externe \\u2014 et \\u00e7a ne dure pas."),
    e('p',null,"Le Super-Hub est con\\u00e7u pour \\u00e9viter ce pi\\u00e8ge. L\\u2019XP est un \\u00e9tayage transitionnel (Favre) : il amorce la pompe, mais c\\u2019est le plaisir du lien social qui cr\\u00e9e l\\u2019addiction positive. Comprendre ce m\\u00e9canisme vous permet de rep\\u00e9rer quand un \\u00e9l\\u00e8ve \\u00abtriche le syst\\u00e8me\\u00bb pour les points sans engagement r\\u00e9el."),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00e9f\u00e9rences : '),"Daniel Favre, Cessons de d\\u00e9motiver les \\u00e9l\\u00e8ves \\u2014 Edward Deci & Richard Ryan, SDT \\u2014 Recherche ludop\\u00e9dagogie adulte 2024"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +80 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Neuro'),e('div',{className:'comp-earn'},'+P\u00e9dagogie'),
      null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00e9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00e9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00e9e':'\u26A0\uFE0F Point d\u2019am\u00e9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00e9nario suivant \u2192':'Synth\u00e8se \u2192'))
    );
  };

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00e9tence solide.":pc>=50?"Des r\u00e9flexes \u00e0 affiner.":"\u00c0 retravailler.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00e8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'\u{1F36C}'),
    e('h1',null,"Module valid\u00e9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00e9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +80 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Neuro'),e('div',{className:'comp-earn'},'+1 P\u00e9dagogie'),
      null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00e0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
