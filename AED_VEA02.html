<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_VEA02 — Me connaître pour mieux accompagner</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#22c55e;--acc-d:#16a34a;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.05) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--green);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#000;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#c4e8d0}
.insight-box strong{color:var(--green)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#22c55e;background:rgba(34,197,94,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_VEA02';
var CERT_KEY  = 'CERT_AED_AED_VEA02';
var BACK_URL  = 'index.html';

var SCENARIOS = [
  {
    ctx: "Fin de journée difficile. Un élève vous a agressé verbalement, deux collègues ont été absents, et vous avez géré seul la cantine. Vous sentez une tension dans la poitrine, une irritabilité. Un élève s'approche maintenant pour vous parler d'un problème avec un camarade.",
    q: "Comment gérez-vous cette situation ?",
    options: [
      {
        label: "Autorégulation consciente",
        text: "'Je prends deux secondes. Je reconnais que je suis épuisé et irritable. Je dis à l'élève : «Je t'écoute, prends deux minutes pour que je sois vraiment disponible pour toi.» Je souffle, je me recentre, puis j'écoute vraiment.'",
        score: 3,
        fb: "Reconnaître son propre état interne avant d'intervenir est la première CPS professionnelle. Ce n'est pas de la faiblesse — c'est de la lucidité. Un adulte qui se connaît régule mieux ses réactions, et un élève qui observe cela apprend quelque chose d'essentiel sur la gestion des émotions.",
        good: true
      },
      {
        label: "Mise à distance émotionnelle forcée",
        text: "Je fais comme si de rien n'était. Je gère l'élève normalement, c'est mon boulot.",
        score: 1,
        fb: "La mise à distance forcée fonctionne à court terme, mais coûte cher à long terme (épuisement, transfert de tension). La fatigue compassionnelle et le burnout des professionnels éducatifs viennent souvent de cette posture. Se connaître, c'est aussi savoir quand on n'est pas au meilleur de soi.",
        good: false
      },
      {
        label: "Évacuation sur l'élève",
        text: "Je l'écoute mais je suis sec et expéditif. Il voit bien que je suis fatigué, il comprendra.",
        score: 0,
        fb: "Transférer son état interne sur un élève est le signe que la régulation émotionnelle propre de l'adulte n'a pas eu lieu. L'élève ne comprendra pas — il interprétera votre sécheresse comme un rejet. La connaissance de soi protège la relation éducative.",
        good: false
      },
    ]
  },
  {
    ctx: "Un élève de 3ème, connu pour ses provocations, vous dit : 'Vous faites semblant de vous occuper de nous, mais en vrai vous en avez rien à faire.' Vous sentez monter de la colère.",
    q: "Que faites-vous avec cette colère ?",
    options: [
      {
        label: "Accueil + exploration interne",
        text: "'Je remarque que ça m'énerve — et c'est précisément parce que je me soucie de lui. Je peux lui dire calmement : «Ce que tu dis me touche, parce que j'y tiens. On peut en parler si tu veux.»'",
        score: 3,
        fb: "La colère, dans ce cas, est un signal que votre valeur d'engagement est activée. Reconnaître l'émotion, en comprendre la source, et la réorienter en message — c'est de l'intelligence émotionnelle au service de la relation. Bandura appelle ça le sentiment d'efficacité personnelle : vous agissez en accord avec vos valeurs.",
        good: true
      },
      {
        label: "Réponse défensive",
        text: "'Si t'es là c'est pour être éduqué, pas pour juger les adultes.' (ton sec)",
        score: 0,
        fb: "La défense face à la provocation confirme souvent ce que l'élève projette. Ce n'est pas un dialogue — c'est une fermeture. La colère non régulée ferme la porte à la compréhension de ce qui se passe réellement chez cet élève (souvent une demande de présence déguisée en rejet).",
        good: false
      },
      {
        label: "Contre-attaque symbolique",
        text: "'Si je n'en avais rien à faire, je serais pas là à 17h.' (puis on passe à autre chose)",
        score: 1,
        fb: "La réponse factuelle peut avoir un sens, mais seule elle ne crée pas de lien. L'élève a exprimé quelque chose d'émotionnel — lui répondre uniquement par un fait, c'est passer à côté de ce qu'il cherche. La connaissance de soi vous permet de sentir quand il faut aller plus loin.",
        good: false
      },
    ]
  },
  {
    ctx: "Lors d'un temps d'échanges entre AED, le CPE vous demande : 'Quelles sont vos forces dans votre accompagnement des élèves ?' Vous hésitez, pensant que vous n'avez rien de particulier à apporter.",
    q: "Comment répondez-vous ?",
    options: [
      {
        label: "Identification de ses forces réelles",
        text: "'Je suis quelqu'un de très disponible dans les moments informels — les couloirs, la cour. Je remarque les changements d'attitude chez les élèves. Et je sais tisser des liens de confiance discrètement, sans pression. Ce sont ces moments qui permettent des paroles qui ne viendraient pas ailleurs.'",
        score: 3,
        fb: "Identifier ses forces (force identification, Peterson & Seligman) est une compétence en soi. Les AED ont souvent une force rare : la relation informelle, la disponibilité dans les interstices. Cette présence ne s'apprend pas dans les manuels — elle se reconnaît et se cultive.",
        good: true
      },
      {
        label: "Minimisation",
        text: "'Je fais juste mon travail, rien de spécial.'",
        score: 0,
        fb: "La minimisation systématique empêche de capitaliser sur ce qui fonctionne déjà. Pour développer le bien-être des élèves, il faut d'abord savoir ce qu'on apporte vraiment. Un AED qui ne sait pas nommer ses forces ne peut pas les mobiliser consciemment.",
        good: false
      },
      {
        label: "Réponse générique",
        text: "'Je suis patient et à l'écoute.' (sans aller plus loin)",
        score: 1,
        fb: "Patience et écoute sont des qualités, mais vagues. La connaissance de soi demande de préciser : dans quels contextes ces qualités s'expriment-elles ? Avec quels élèves ? À quel moment ? La précision transforme une qualité floue en force activable.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"🪞", t:"La connaissance de soi :", v:"Première des 10 CPS de l'OMS. Elle conditionne toutes les autres : on ne peut pas gérer ses émotions sans les reconnaître, ni communiquer efficacement sans savoir d'où on parle."},
  {icon:"⚡", t:"L'émotion comme signal :", v:"La colère, la fatigue, l'irritabilité ne sont pas des défauts professionnels. Ce sont des informations. Les reconnaître permet de les réguler au lieu de les subir ou de les transférer."},
  {icon:"💪", t:"Ses forces comme levier :", v:"Chaque AED a des forces spécifiques : la présence informelle, la discrétion, la continuité, la disponibilité. Les nommer permet de les déployer consciemment au service des élèves."},
  {icon:"🌿", t:"Le soin de soi est éducatif :", v:"Un adulte qui prend soin de lui montre par l'exemple que la régulation émotionnelle est possible. C'est un acte pédagogique autant qu'une nécessité professionnelle."},
];

function getPlayer(){
  try{var u=new URLSearchParams(window.location.search),p=u.get('player');
    if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);localStorage.setItem('pvs_aed_player',p);return p;}
  }catch(ex){}
  return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';
}
function awardXP(){
  try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : Me connaître pour mieux accompagner',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];
  var finish=function(){var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};localStorage.setItem(CERT_KEY,JSON.stringify(cert));awardXP();setStep('complete');};
  var goBack=function(){var p=getPlayer();var sep=BACK_URL.indexOf('?')===-1?'?':'&';window.location.href=p&&p!=='anonyme'?BACK_URL+sep+'player='+encodeURIComponent(p):BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'🪞 ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'← La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Vivre Ensemble Actif · Module 2/6'),
    e('h1',null,"Me connaître pour mieux accompagner"),
    e('p',{className:'quote'},'"'+"On ne peut donner que ce qu'on a. Et on ne peut avoir ce qu'on n'a pas exploré."+'" — Carl Rogers'),
    e('p',null,"Accompagner des élèves demande une ressource rare : la connaissance de soi. Non par narcissisme, mais parce que l'adulte non conscient de ses propres émotions, peurs et forces les transfère — souvent à son insu — dans la relation éducative."),
    e('p',null,"Ce module explore trois dimensions de la connaissance de soi appliquée au travail d'AED : reconnaître ses états internes, comprendre ses réactions face à la provocation, et identifier ses forces réelles. C'est la boussole intérieure qui permet d'agir avec cohérence même dans les situations difficiles."),
    e('div',{className:'insight-box'},e('strong',null,'📚 Références : '),"Martin Seligman, Character Strengths and Virtues (Peterson & Seligman, 2004) — Carl Rogers, Le développement de la personne — Albert Bandura, Self-Efficacy: The Exercise of Control"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'⚡ +80 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Connaissance de soi'),e('div',{className:'comp-earn'},'+Régulation'),null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le scénario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Scénario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'📍 Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},e('strong',null,feedback.good?'✅ Posture adaptée':'⚠️ Point d\'amélioration'),e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Scénario suivant →':'Synthèse →'))
    );
  };

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Compétence solide.":pc>=50?"Des réflexes à affiner.":"À retravailler.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synthèse'),e('h2',null,"Ce qu'il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'🎯 Score : '),score+'/'+mx+' ('+pc+'%) — '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module →')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'🪞'),
    e('h1',null,"Module validé !"),
    e('p',{style:{textAlign:'center'}},"La connaissance de soi est votre boussole intérieure. Elle grandit à chaque situation difficile traversée avec lucidité."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'⚡ +80 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Connaissance de soi'),e('div',{className:'comp-earn'},'+1 Régulation'),null),
    e('button',{className:'btn',onClick:goBack},'← Retour à La Forge')
  );};

  switch(step){case 'intro':return renderIntro();case 'scenario':return renderScenario();case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();default:return renderIntro();}
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
