<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_NEU05 \u2014 L\u2019empathie comme outil professionnel</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#10b981;--acc-d:#047857;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(16,185,129,.06) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_NEU05';
var CERT_KEY  = 'CERT_AED_AED_NEU05';
var BACK_URL  = 'index_PIX_AED.html';

var SCENARIOS = [
  {
    ctx: "Une \\u00e9l\\u00e8ve de 3\\u00e8me, d\\u2019habitude vive, est prostr\\u00e9e depuis deux jours. Vous l\\u2019abordez en cour. Elle dit : \\u00abMes parents divorcent. Tout s\\u2019effondre.\\u00bb Et elle se met \\u00e0 pleurer.",
    q: "Comment r\\u00e9pondez-vous avec empathie professionnelle ?",
    options: [
      {
        label: "Empathie sans absorption",
        text: "Je l\\u2019\\u00e9coute sans couper. Quand elle marque une pause : \\u00abC\\u2019est une situation tr\\u00e8s lourde \\u00e0 porter \\u00e0 ton \\u00e2ge. Ce que tu ressens est normal.\\u00bb Je ne dis PAS \\u00abje comprends\\u00bb (je ne vis pas sa situation). Je ne donne PAS de conseil. Je propose : \\u00abTu voudrais en parler \\u00e0 quelqu\\u2019un qui peut vraiment t\\u2019aider ? L\\u2019infirmi\\u00e8re ou l\\u2019AS ?\\u00bb",
        score: 3,
        fb: "L\\u2019empathie professionnelle en trois gestes : \\u00e9couter sans interrompre, valider l\\u2019\\u00e9motion sans la juger (\\u00abc\\u2019est normal\\u00bb), orienter vers un professionnel comp\\u00e9tent. L\\u2019AED n\\u2019est pas psy \\u2014 mais sa pr\\u00e9sence attentive est th\\u00e9rapeutique en soi (Rogers).",
        good: true
      },
      {
        label: "Sympathie envahissante",
        text: "\\u00abOh non, c\\u2019est terrible ! \\u00c7a me fait tellement de peine ! Mes parents ont divorc\\u00e9 aussi, je sais ce que c\\u2019est...\\u00bb",
        score: 1,
        fb: "Partager son v\\u00e9cu part d\\u2019une bonne intention, mais \\u00e7a d\\u00e9place le focus sur vous. L\\u2019\\u00e9l\\u00e8ve n\\u2019a pas besoin de savoir que vous comprenez \\u2014 elle a besoin de sentir que vous \\u00eatres l\\u00e0 pour ELLE. La sympathie envahissante absorbe l\\u2019\\u00e9motion au lieu de la contenir.",
        good: false
      },
      {
        label: "Minimisation positive",
        text: "\\u00abT\\u2019inqui\\u00e8te, beaucoup de gens divorcent, \\u00e7a va aller.\\u00bb",
        score: 0,
        fb: "Pour elle, \\u00e0 cet instant, tout s\\u2019effondre. Dire \\u00ab\\u00e7a va aller\\u00bb nie l\\u2019intensit\\u00e9 de sa d\\u00e9tresse. La normalisation statistique (\\u00abbeaucoup divorcent\\u00bb) n\\u2019a aucune valeur consolatoire pour quelqu\\u2019un en pleine crise.",
        good: false
      },
    ]
  },
  {
    ctx: "Un \\u00e9l\\u00e8ve de 5\\u00e8me, connu pour \\u00eatre difficile, vient vous voir et dit maladroitement : \\u00abMonsieur/Madame, je... j\\u2019ai fait un truc grave hier. J\\u2019ai frapp\\u00e9 mon petit fr\\u00e8re tr\\u00e8s fort. J\\u2019ai honte.\\u00bb",
    q: "Comment utilisez-vous l\\u2019empathie ici ?",
    options: [
      {
        label: "Accueillir l\\u2019aveu + orienter",
        text: "\\u00abLe fait que tu viennes m\\u2019en parler, c\\u2019est d\\u00e9j\\u00e0 un truc important. \\u00c7a veut dire que tu sais que c\\u2019\\u00e9tait pas bien. On va en parler avec quelqu\\u2019un qui peut t\\u2019aider \\u00e0 comprendre pourquoi \\u00e7a s\\u2019est pass\\u00e9 \\u2014 et \\u00e0 faire en sorte que \\u00e7a n\\u2019arrive plus.\\u00bb Je transmets au CPE.",
        score: 3,
        fb: "L\\u2019\\u00e9l\\u00e8ve fait un acte de confiance rare. L\\u2019empathie ici n\\u2019est pas de valider la violence \\u2014 c\\u2019est de valoriser la d\\u00e9marche de l\\u2019aveu. Nommer que \\u00abvenir en parler, c\\u2019est d\\u00e9j\\u00e0 un truc\\u00bb rench\\u00e9rit la conscience morale naissante sans excuser l\\u2019acte.",
        good: true
      },
      {
        label: "Moraliser",
        text: "\\u00abFrapper son petit fr\\u00e8re, c\\u2019est grave. Tu ne dois jamais faire \\u00e7a.\\u00bb",
        score: 1,
        fb: "Il le sait \\u2014 c\\u2019est pr\\u00e9cis\\u00e9ment pour \\u00e7a qu\\u2019il vient. R\\u00e9p\\u00e9ter l\\u2019interdit au moment o\\u00f9 il fait l\\u2019effort de parler, c\\u2019est punir l\\u2019aveu. La prochaine fois, il ne viendra plus.",
        good: false
      },
      {
        label: "D\\u00e9dramatiser",
        text: "\\u00abBah, tous les fr\\u00e8res se battent, c\\u2019est pas si grave.\\u00bb",
        score: 0,
        fb: "L\\u2019\\u00e9l\\u00e8ve ressent de la honte \\u2014 un sentiment moral puissant et l\\u00e9gitime. Le d\\u00e9dramatiser, c\\u2019est invalider sa conscience morale en formation. Il dit \\u00abc\\u2019est grave\\u00bb \\u2014 vous devez entendre cette gravit\\u00e9.",
        good: false
      },
    ]
  },
  {
    ctx: "Fin de journ\\u00e9e. Vous avez encaiss\\u00e9 une situation \\u00e9motionnellement lourde avec un \\u00e9l\\u00e8ve en d\\u00e9tresse. Vous sentez que \\u00e7a vous a atteint.",
    q: "Comment g\\u00e9rez-vous la fatigue empathique ?",
    options: [
      {
        label: "Reconnaissance + d\\u00e9charge",
        text: "Je reconnais que \\u00e7a m\\u2019a touch\\u00e9 \\u2014 c\\u2019est normal, c\\u2019est le signe que l\\u2019empathie fonctionne. J\\u2019en parle \\u00e0 un coll\\u00e8gue ou au CPE : \\u00abLa situation avec X m\\u2019a secou\\u00e9, j\\u2019avais besoin d\\u2019en parler.\\u00bb Et je fais une coupure nette : quand je sors du coll\\u00e8ge, je d\\u00e9connecte.",
        score: 3,
        fb: "La fatigue empathique (ou usure de compassion) est un risque professionnel r\\u00e9el pour les AED. La reconna\\u00eetre, la verbaliser entre pairs, et couper le soir est de l\\u2019hygi\\u00e8ne de base. L\\u2019empathie n\\u2019est durable que si on la recharge.",
        good: true
      },
      {
        label: "S\\u2019endurcirir",
        text: "\\u00abFaut que j\\u2019apprenne \\u00e0 ne plus me laisser toucher.\\u00bb",
        score: 0,
        fb: "L\\u2019endurcissement \\u00e9motionnel n\\u2019est pas de la r\\u00e9silience \\u2014 c\\u2019est de l\\u2019\\u00e9rosion. Un AED qui ne ressent plus rien a perdu son outil principal. La solution n\\u2019est pas de ne plus ressentir, c\\u2019est de mieux \\u00e9vacuer.",
        good: false
      },
      {
        label: "Ruminer",
        text: "J\\u2019y pense toute la soir\\u00e9e en cherchant ce que j\\u2019aurais pu faire de mieux.",
        score: 1,
        fb: "L\\u2019auto-analyse a sa place, mais le soir m\\u00eame c\\u2019est de la rumination, pas de la r\\u00e9flexion. Le cerveau a besoin de coupure pour int\\u00e9grer. Demain, \\u00e0 froid, l\\u2019analyse sera plus juste.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"\u{1F9E0}", t:"Empathie \\u2260 sympathie :", v:"Comprendre sans absorber. Capter le signal sans s\\u2019y noyer. C\\u2019est un outil, pas une noyade."},
  {icon:"\u{1F442}", t:"\\u00c9couter + valider + orienter :", v:"Trois temps de l\\u2019empathie professionnelle. L\\u2019AED n\\u2019est pas psy \\u2014 mais sa pr\\u00e9sence attentive est d\\u00e9j\\u00e0 th\\u00e9rapeutique."},
  {icon:"\u{1F64F}", t:"Valoriser l\\u2019aveu :", v:"Un \\u00e9l\\u00e8ve qui vient parler de sa faute fait un acte moral. Punir l\\u2019aveu tue la prochaine confidence."},
  {icon:"\u{1F50B}", t:"Fatigue empathique :", v:"Risque professionnel r\\u00e9el. Verbaliser, partager, couper le soir. L\\u2019empathie n\\u2019est durable que si on la recharge."},
];


function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function awardXP(){
  try{
    var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : L\\u2019empathie comme outil professionnel',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){window.location.href=BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Cerveau Ado & Empathie \u2014 CERTIFICATION \u00B7 Module 1/5'),
    e('h1',null,"L\\u2019empathie comme outil professionnel"),
    e('p',{className:'quote'},'"'+"L\\u2019empathie n\\u2019est pas ressentir \\u00e0 la place de l\\u2019autre. C\\u2019est comprendre ce qu\\u2019il ressent sans s\\u2019y noyer."+'" \u2014 Daniel Favre'),
    e('p',null,"L\\u2019empathie professionnelle n\\u2019est pas la sympathie (\\u00abje souffre avec toi\\u00bb) ni la contagion \\u00e9motionnelle (\\u00abje suis submerg\\u00e9 par ta souffrance\\u00bb). C\\u2019est une comp\\u00e9tence technique : capter le signal \\u00e9motionnel de l\\u2019autre, le comprendre, et y r\\u00e9pondre de mani\\u00e8re adapt\\u00e9e \\u2014 sans perdre sa propre stabilit\\u00e9."),
    e('p',null,"Ce module de certification \\u00e9value votre capacit\\u00e9 \\u00e0 utiliser l\\u2019empathie comme un outil de travail : d\\u00e9coder les \\u00e9motions sans les absorber, reformuler sans minimiser, et poser des actes concrets qui r\\u00e9pondent au besoin d\\u00e9tect\\u00e9."),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00e9f\u00e9rences : '),"Daniel Favre, Empathie et apprentissage \\u2014 Carl Rogers, L\\u2019approche centr\\u00e9e sur la personne \\u2014 Neurosciences de l\\u2019empathie (neurones miroirs)"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +120 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Empathie'),e('div',{className:'comp-earn'},'+Compr\u00e9hension'),
      null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00e9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00e9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00e9e':'\u26A0\uFE0F Point d\u2019am\u00e9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00e9nario suivant \u2192':'Synth\u00e8se \u2192'))
    );
  };

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00e9tence solide.":pc>=50?"Des r\u00e9flexes \u00e0 affiner.":"\u00c0 retravailler.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00e8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'\u{1F9E0}'),
    e('h1',null,"Module valid\u00e9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00e9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +120 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Empathie'),e('div',{className:'comp-earn'},'+1 Compr\u00e9hension'),
      null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00e0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
