<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_POS05 \u2014 La\u00efcit\u00e9 v\u00e9cue au quotidien</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#3b82f6;--acc-d:#1d4ed8;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.06) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_POS05';
var CERT_KEY  = 'CERT_AED_AED_POS05';
var BACK_URL  = 'index_PIX_AED.html';

var SCENARIOS = [
  {
    ctx: "Un \\u00e9l\\u00e8ve de 3\\u00e8me porte une cha\\u00eene avec une croix visible sous son t-shirt. Un autre \\u00e9l\\u00e8ve vous interpelle : \\u00abLui il a le droit d\\u2019avoir une croix et moi j\\u2019ai pas le droit de porter un voile ? C\\u2019est injuste !\\u00bb",
    q: "Comment r\\u00e9pondez-vous ?",
    options: [
      {
        label: "Explication juridique claire",
        text: "\\u00abLa loi ne fait pas de diff\\u00e9rence entre les religions. Elle distingue les signes discrets (une petite croix, une \\u00e9toile de David, une main de Fatma) des signes ostensibles (un voile, une kippa, une grande croix). C\\u2019est la visibilit\\u00e9 qui compte, pas la religion. La m\\u00eame r\\u00e8gle s\\u2019applique \\u00e0 tous.\\u00bb",
        score: 3,
        fb: "La loi de 2004 vise les signes \\u00abpar lesquels les \\u00e9l\\u00e8ves manifestent ostensiblement une appartenance religieuse\\u00bb \\u2014 pas tous les signes. La distinction discret/ostensible est universelle : elle s\\u2019applique \\u00e0 toutes les religions de la m\\u00eame mani\\u00e8re.",
        good: true
      },
      {
        label: "\\u00c9viter",
        text: "\\u00abC\\u2019est pas \\u00e0 moi de r\\u00e9pondre \\u00e0 \\u00e7a, va voir le CPE.\\u00bb",
        score: 1,
        fb: "L\\u2019orientation est l\\u00e9gitime pour un cas complexe, mais cette question est basique et fr\\u00e9quente. Un AED doit pouvoir y r\\u00e9pondre \\u2014 c\\u2019est le socle de la la\\u00efcit\\u00e9 appliqu\\u00e9e.",
        good: false
      },
      {
        label: "Relativiser",
        text: "\\u00abOui, c\\u2019est compliqu\\u00e9, la la\\u00efcit\\u00e9 n\\u2019est pas parfaite.\\u00bb",
        score: 0,
        fb: "La la\\u00efcit\\u00e9 peut \\u00eatre discut\\u00e9e dans ses applications, mais le cadre juridique est clair et ne doit pas \\u00eatre pr\\u00e9sent\\u00e9 comme \\u00abimparfait\\u00bb face \\u00e0 un \\u00e9l\\u00e8ve. L\\u2019AED porte le cadre \\u2014 il ne le relativise pas en public.",
        good: false
      },
    ]
  },
  {
    ctx: "\\u00c0 la cantine, un \\u00e9l\\u00e8ve refuse de s\\u2019asseoir \\u00e0 c\\u00f4t\\u00e9 d\\u2019un camarade en disant : \\u00abMa religion m\\u2019interdit de manger avec lui.\\u00bb",
    q: "Comment r\\u00e9agissez-vous ?",
    options: [
      {
        label: "Cadrage la\\u00efc + respect",
        text: "\\u00abIci, \\u00e0 la cantine du coll\\u00e8ge, tout le monde peut s\\u2019asseoir \\u00e0 c\\u00f4t\\u00e9 de tout le monde. Ta foi t\\u2019appartient et on la respecte, mais elle ne peut pas servir \\u00e0 exclure un camarade d\\u2019un espace commun. Assieds-toi, tu ne manges pas ce que tu ne veux pas manger, mais tu partages l\\u2019espace.\\u00bb",
        score: 3,
        fb: "Le principe la\\u00efc \\u00e0 l\\u2019\\u00e9cole : la libert\\u00e9 de conscience est prot\\u00e9g\\u00e9e, mais elle ne peut pas justifier l\\u2019exclusion d\\u2019un autre \\u00e9l\\u00e8ve. Respecter la foi \\u2260 accepter la s\\u00e9gr\\u00e9gation. L\\u2019espace scolaire est commun par d\\u00e9finition.",
        good: true
      },
      {
        label: "Accepter",
        text: "\\u00abOK, mets-toi ailleurs si tu pr\\u00e9f\\u00e8res.\\u00bb",
        score: 0,
        fb: "Accepter l\\u2019exclusion d\\u2019un \\u00e9l\\u00e8ve sur motif religieux, c\\u2019est valider une discrimination. L\\u2019\\u00e9l\\u00e8ve exclu re\\u00e7oit le message : \\u00abta pr\\u00e9sence d\\u00e9range et l\\u2019institution est d\\u2019accord.\\u00bb C\\u2019est l\\u2019inverse de la la\\u00efcit\\u00e9.",
        good: false
      },
      {
        label: "S\\u2019\\u00e9nerver",
        text: "\\u00abTa religion n\\u2019a rien \\u00e0 faire ici, on est dans une \\u00e9cole la\\u00efque !\\u00bb",
        score: 1,
        fb: "Le fond est juste mais la forme blesse. La la\\u00efcit\\u00e9 ne dit PAS \\u00abta religion n\\u2019a rien \\u00e0 faire ici\\u00bb \\u2014 elle dit \\u00abta foi t\\u2019appartient mais ne peut pas organiser l\\u2019espace commun\\u00bb. La nuance est fondamentale.",
        good: false
      },
    ]
  },
  {
    ctx: "Un coll\\u00e8gue AED porte un pendentif religieux visible pendant son service. Un enseignant vous en parle : \\u00abIl a le droit de faire \\u00e7a ?\\u00bb",
    q: "Quelle est la r\\u00e8gle pour les agents ?",
    options: [
      {
        label: "Neutralit\\u00e9 stricte des agents",
        text: "\\u00abNon, les agents du service public sont tenus \\u00e0 une neutralit\\u00e9 stricte \\u2014 aucun signe religieux, m\\u00eame discret. C\\u2019est diff\\u00e9rent des \\u00e9l\\u00e8ves qui ont droit aux signes discrets. Un AED est un agent public. Il faut lui en parler, calmement.\\u00bb",
        score: 3,
        fb: "La distinction est fondamentale : les agents (enseignants, CPE, AED, AESH) sont soumis \\u00e0 une neutralit\\u00e9 stricte \\u2014 aucun signe religieux quelle que soit la taille. Les \\u00e9l\\u00e8ves gardent leur libert\\u00e9 de conscience avec la seule limite des signes ostensibles (loi 2004). Deux r\\u00e9gimes distincts.",
        good: true
      },
      {
        label: "M\\u00eame r\\u00e8gle que les \\u00e9l\\u00e8ves",
        text: "\\u00abS\\u2019il est discret, c\\u2019est comme pour les \\u00e9l\\u00e8ves, \\u00e7a passe.\\u00bb",
        score: 0,
        fb: "Erreur fr\\u00e9quente : les agents et les \\u00e9l\\u00e8ves ne sont PAS soumis au m\\u00eame r\\u00e9gime. L\\u2019agent est neutre \\u2014 point. Pas de \\u00abdiscret \\u00e7a passe\\u00bb pour un agent public.",
        good: false
      },
      {
        label: "Pas mon probl\\u00e8me",
        text: "\\u00abC\\u2019est \\u00e0 la direction de g\\u00e9rer \\u00e7a.\\u00bb",
        score: 1,
        fb: "Techniquement vrai \\u2014 c\\u2019est la hi\\u00e9rarchie qui recadre. Mais conna\\u00eetre la r\\u00e8gle, c\\u2019est la comp\\u00e9tence de tout agent. Et entre coll\\u00e8gues, un rappel bienveillant peut pr\\u00e9c\\u00e9der l\\u2019intervention hi\\u00e9rarchique.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"\u{1F3DB}", t:"Loi 1905 :", v:"L\\u2019\\u00c9tat ne reconna\\u00eet ni ne finance aucun culte. La la\\u00efcit\\u00e9 prot\\u00e8ge la libert\\u00e9 de conscience \\u2014 elle ne supprime pas la religion."},
  {icon:"\u{1F3EB}", t:"Agents vs \\u00e9l\\u00e8ves :", v:"Agents = neutralit\\u00e9 stricte (aucun signe). \\u00c9l\\u00e8ves = libert\\u00e9 de conscience + interdiction des signes ostensibles (loi 2004)."},
  {icon:"\u2696\uFE0F", t:"Discret vs ostensible :", v:"La distinction est universelle \\u2014 toutes religions confondues. C\\u2019est la visibilit\\u00e9 qui compte, pas la religion."},
  {icon:"\u{1F91D}", t:"Espace commun :", v:"La foi appartient \\u00e0 chacun. L\\u2019espace scolaire appartient \\u00e0 tous. Aucune conviction ne peut exclure un pair de l\\u2019espace partag\\u00e9."},
];


function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function awardXP(){
  try{
    var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : La\\u00efcit\\u00e9 v\\u00e9cue au quotidien',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){window.location.href=BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Posture & D\u00e9ontologie \u2014 CERTIFICATION \u00B7 Module 1/5'),
    e('h1',null,"La\\u00efcit\\u00e9 v\\u00e9cue au quotidien"),
    e('p',{className:'quote'},'"'+"La la\\u00efcit\\u00e9 n\\u2019est pas une opinion parmi d\\u2019autres, c\\u2019est la libert\\u00e9 d\\u2019en avoir une."+'" \u2014 Henri Pena-Ruiz'),
    e('p',null,"La la\\u00efcit\\u00e9 \\u00e0 l\\u2019\\u00e9cole n\\u2019est pas un concept abstrait \\u2014 c\\u2019est une situation quotidienne. Un \\u00e9l\\u00e8ve qui refuse de manger \\u00e0 c\\u00f4t\\u00e9 d\\u2019un camarade pour motif religieux, une demande d\\u2019absence pour f\\u00eate religieuse, un d\\u00e9bat qui d\\u00e9rape en cours. L\\u2019AED est en premi\\u00e8re ligne."),
    e('p',null,"Ce module de certification teste votre capacit\\u00e9 \\u00e0 appliquer le cadre la\\u00efc avec justesse : ni rigidit\\u00e9 administrative aveugle, ni relativisme qui noie tout. La loi de 1905, la loi de 2004, et la distinction agents/\\u00e9l\\u00e8ves sont vos trois rep\\u00e8res."),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00e9f\u00e9rences : '),"Loi 1905 s\\u00e9paration \\u00c9glises/\\u00c9tat \\u2014 Loi 2004 signes ostensibles \\u2014 Charte de la la\\u00efcit\\u00e9 \\u00e0 l\\u2019\\u00e9cole \\u2014 Vademecum la\\u00efcit\\u00e9 (MEN)"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +100 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+La\u00efcit\u00e9'),e('div',{className:'comp-earn'},'+Posture'),
      null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00e9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00e9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00e9e':'\u26A0\uFE0F Point d\u2019am\u00e9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00e9nario suivant \u2192':'Synth\u00e8se \u2192'))
    );
  };

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00e9tence solide.":pc>=50?"Des r\u00e9flexes \u00e0 affiner.":"\u00c0 retravailler.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00e8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'\u{1F3DB}'),
    e('h1',null,"Module valid\u00e9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00e9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +100 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 La\u00efcit\u00e9'),e('div',{className:'comp-earn'},'+1 Posture'),
      null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00e0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
