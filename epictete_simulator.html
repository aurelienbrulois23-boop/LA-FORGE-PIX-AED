<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIX AED — Simulateur Épictète</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#00d4ff;--primary-dim:rgba(0,212,255,.12);--primary-glow:rgba(0,212,255,.35);
  --gold:#f59e0b;--gold-dim:rgba(245,158,11,.12);--gold-glow:rgba(245,158,11,.3);
  --bg:#000a10;--panel:#041420;--panel2:#071e2c;--panel3:#0d2035;
  --text:#c8f0ff;--text-m:#4a8fa8;--text-d:#1a4a60;
  --green:#10b981;--red:#ef4444;--border:rgba(0,212,255,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 15% 0%,rgba(0,212,255,.08) 0%,transparent 50%),
             radial-gradient(ellipse at 85% 100%,rgba(245,158,11,.05) 0%,transparent 50%)}
#root{max-width:860px;margin:0 auto;padding:0 0 60px}

/* HEADER */
.epi-header{padding:24px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.epi-logo{font-size:2.4rem;filter:drop-shadow(0 0 10px var(--gold-glow))}
.epi-meta{flex:1}
.epi-pilier{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:3px}
.epi-title{font-family:'Orbitron',sans-serif;font-size:1.25rem;color:#fff;margin-bottom:2px}
.epi-sub{font-size:.85rem;color:var(--text-m)}
.epi-badge{background:var(--gold-dim);border:1px solid rgba(245,158,11,.3);padding:5px 14px;border-radius:20px;font-family:'Orbitron',sans-serif;font-size:.7rem;color:var(--gold);white-space:nowrap}

/* LOADING SCREEN */
.load-screen{padding:60px 22px;text-align:center}
.load-icon{font-size:3rem;margin-bottom:16px;animation:pulse-g 1.8s infinite}
@keyframes pulse-g{0%{opacity:1;filter:drop-shadow(0 0 14px var(--gold-glow))}50%{opacity:.6;filter:drop-shadow(0 0 4px transparent)}100%{opacity:1;filter:drop-shadow(0 0 14px var(--gold-glow))}}
.load-title{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--gold);margin-bottom:8px}
.load-sub{font-size:.85rem;color:var(--text-m);margin-bottom:20px;line-height:1.6}
.load-bar-wrap{max-width:360px;margin:16px auto 0;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.load-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:2px;transition:width .3s}
.load-status{font-family:'Orbitron',sans-serif;font-size:.6rem;color:var(--text-d);margin-top:8px;letter-spacing:1px}
.btn-load{margin-top:20px;background:var(--primary);color:#000;border:none;padding:12px 28px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.75rem;cursor:pointer;letter-spacing:1px;transition:.2s}
.btn-load:hover{background:#00b8e0}.btn-load:disabled{opacity:.4;cursor:not-allowed}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 22px}
.tab{background:none;border:none;color:var(--text-d);padding:12px 18px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.68rem;letter-spacing:1px;border-bottom:2px solid transparent;transition:.2s}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* SCREENS */
.screen{padding:28px 22px}
.screen-title{font-family:'Orbitron',sans-serif;font-size:.82rem;letter-spacing:2px;text-transform:uppercase;color:var(--primary);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.screen-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* COACH MODE */
.pillar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.pillar-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.2s;text-align:center}
.pillar-card:hover,.pillar-card.active{border-color:var(--primary);background:var(--panel2)}
.pillar-icon{font-size:1.5rem;margin-bottom:4px}
.pillar-name{font-family:'Orbitron',sans-serif;font-size:.6rem;color:var(--primary);letter-spacing:1px;margin-bottom:2px}
.pillar-label{font-size:.72rem;color:var(--text-m);line-height:1.3}
.coach-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px}
.coach-q{display:flex;gap:10px;align-items:flex-end;margin-bottom:14px}
.coach-input{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.88rem;font-family:'Exo 2',sans-serif;outline:none;resize:none;min-height:44px;max-height:100px}
.coach-input:focus{border-color:var(--primary)}
.coach-input::placeholder{color:var(--text-d)}
.coach-input:disabled{opacity:.4}
.btn-coach{background:var(--primary);color:#000;border:none;padding:11px 18px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.68rem;cursor:pointer;white-space:nowrap;transition:.2s}
.btn-coach:disabled{opacity:.4;cursor:not-allowed}
.coach-answer{background:var(--panel2);border:1px solid rgba(0,212,255,.15);border-radius:8px;padding:16px;font-size:.88rem;line-height:1.7;color:rgba(200,240,255,.85);min-height:60px}
.coach-answer.streaming::after{content:'▋';animation:blink .8s infinite;color:var(--primary)}
@keyframes blink{0%{opacity:1}50%{opacity:0}100%{opacity:1}}
.coach-hint{font-size:.7rem;color:var(--text-d);margin-bottom:10px;font-style:italic}

/* SCENARIO CARDS */
.sc-grid{display:grid;grid-template-columns:1fr;gap:14px}
.sc-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:.25s;display:flex;gap:16px;align-items:flex-start}
.sc-card:hover{border-color:var(--primary);background:var(--panel2)}
.sc-icon{font-size:2.2rem;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(0,212,255,.3))}
.sc-content{flex:1}
.sc-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.sc-name{font-family:'Orbitron',sans-serif;font-size:.92rem;color:#fff}
.sc-diff{font-size:.68rem;font-family:'Orbitron',sans-serif;padding:2px 10px;border-radius:20px}
.sc-ctx{font-size:.85rem;color:var(--text-m);line-height:1.6;margin-bottom:10px}
.sc-tip{font-size:.78rem;color:var(--primary);font-style:italic;border-left:2px solid var(--border);padding-left:10px}
.sc-cta{background:var(--primary);color:#000;border:none;padding:9px 22px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.7rem;cursor:pointer;transition:.2s;margin-top:12px;letter-spacing:1px}
.sc-cta:hover{background:#00b8e0}

/* CHAT */
.chat-banner{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:12px;justify-content:space-between;flex-wrap:wrap}
.chat-persona{display:flex;align-items:center;gap:10px}
.chat-persona-icon{font-size:1.5rem}
.chat-persona-name{font-family:'Orbitron',sans-serif;font-size:.8rem;color:#fff}
.chat-persona-sub{font-size:.72rem;color:var(--text-m)}
.chat-counter{font-family:'Orbitron',sans-serif;font-size:.72rem;color:var(--text-d);padding:4px 12px;background:var(--panel2);border-radius:20px;border:1px solid var(--border)}
.chat-counter.warn{color:var(--gold);border-color:rgba(245,158,11,.3)}
.chat-window{height:420px;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:12px}
.chat-window::-webkit-scrollbar{width:4px}.chat-window::-webkit-scrollbar-track{background:transparent}.chat-window::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.bubble-wrap-user{display:flex;justify-content:flex-end}
.bubble-wrap-ai{display:flex;justify-content:flex-start}
.bubble-user{background:var(--panel3);border:1px solid rgba(0,212,255,.25);border-radius:12px 12px 3px 12px;padding:12px 16px;max-width:72%;font-size:.9rem;line-height:1.55;color:var(--text)}
.bubble-ai{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:12px 12px 12px 3px;padding:12px 16px;max-width:72%;font-size:.9rem;line-height:1.55;color:rgba(200,240,255,.8)}
.bubble-label{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:1px;margin-bottom:5px}
.bubble-label-user{color:rgba(0,212,255,.5)}
.bubble-label-ai{color:rgba(255,255,255,.2)}
.typing{display:flex;align-items:center;gap:6px;padding:4px 0}
.dot{width:7px;height:7px;background:var(--text-d);border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-row{display:flex;gap:10px;padding:14px 22px;border-top:1px solid var(--border);align-items:flex-end}
.chat-input{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:.9rem;font-family:'Exo 2',sans-serif;outline:none;resize:none;min-height:44px;max-height:120px}
.chat-input:focus{border-color:var(--primary)}
.chat-input::placeholder{color:var(--text-d)}
.chat-input:disabled{opacity:.4}
.btn-send{background:var(--primary);color:#000;border:none;padding:11px 18px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.7rem;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-send:hover{background:#00b8e0}.btn-send:disabled{opacity:.4;cursor:not-allowed}
.btn-eval{background:var(--gold-dim);border:1px solid rgba(245,158,11,.4);color:var(--gold);border-radius:8px;padding:11px 18px;font-family:'Orbitron',sans-serif;font-size:.7rem;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-eval:hover{background:rgba(245,158,11,.2)}
.btn-eval:disabled{opacity:.4;cursor:not-allowed}
.err-bar{background:rgba(239,68,68,.08);border-top:1px solid rgba(239,68,68,.2);padding:10px 22px;font-size:.8rem;color:#fca5a5;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-retry{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:#fca5a5;padding:5px 12px;border-radius:6px;font-size:.75rem;font-family:'Exo 2',sans-serif;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-retry:hover{background:rgba(239,68,68,.28)}

/* EVALUATING */
.eval-loading{text-align:center;padding:60px 20px}
.eval-loading-icon{font-size:3rem;margin-bottom:16px;animation:pulse-g 1.8s infinite}
.eval-loading-title{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--gold);margin-bottom:8px}
.eval-loading-sub{font-size:.85rem;color:var(--text-m)}
.eval-result{background:var(--panel);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:24px;font-size:.9rem;line-height:1.8;color:var(--text-m)}
.eval-result b{color:var(--text)}
.eval-restart{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}

/* UTILS */
.btn{padding:10px 22px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.72rem;letter-spacing:1px;cursor:pointer;transition:.2s;border:none}
.btn-pri{background:var(--primary);color:#000}.btn-pri:hover{background:#00b8e0}
.btn-sec{background:transparent;border:1px solid var(--border);color:var(--text-m)}.btn-sec:hover{border-color:var(--primary);color:var(--primary)}
.btn-gold{background:var(--gold-dim);border:1px solid rgba(245,158,11,.4);color:var(--gold)}.btn-gold:hover{background:rgba(245,158,11,.2)}
.local-badge{font-size:.62rem;padding:2px 8px;border-radius:4px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#10b981;font-family:'Orbitron',sans-serif;letter-spacing:.5px}
@media(max-width:580px){.bubble-user,.bubble-ai{max-width:88%}.chat-window{height:320px}.pillar-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}}
</style>
</head>
<body>
<div id="root"></div>
<script src="local_llm.js"></script>
<script src="epictete_helpers.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef,useCallback}=React, e=React.createElement;

/* ─────────────────── APP ─────────────────── */
function App(){
  const[ready,setReady]=useState(false);
  const[activating,setActivating]=useState(false);
  const[loadProgress,setLoadProgress]=useState({text:'Initialisation...',progress:0});
  const[loadErr,setLoadErr]=useState('');
  const[tab,setTab]=useState('scenario'); // 'scenario' | 'coach'
  const[screen,setScreen]=useState('list'); // list | chat | evaluating | evaluation
  const[scenario,setScenario]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const[evaluation,setEvaluation]=useState('');
  const[exchanges,setExchanges]=useState(0);
  const[err,setErr]=useState('');
  // Coach state
  const[coachPillar,setCoachPillar]=useState(null);
  const[coachInput,setCoachInput]=useState('');
  const[coachAnswer,setCoachAnswer]=useState('');
  const[coachLoading,setCoachLoading]=useState(false);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);
  const coachInputRef=useRef(null);

  useEffect(()=>{
    if(window.LocalLLM&&window.LocalLLM.isReady()){setReady(true);}
  },[]);

  useEffect(()=>{
    if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:'smooth'});
  },[msgs,loading]);

  function activateModel(){
    if(activating||ready)return;
    setActivating(true);setLoadErr('');
    window.LocalLLM.activate({
      onProgress:function(p){setLoadProgress({text:p.text,progress:p.progress});},
      onReady:function(){setReady(true);setActivating(false);},
      onError:function(err){setLoadErr(err.message||String(err));setActivating(false);}
    });
  }

  /* ── HEADER ── */
  function H(){return e('div',{className:'epi-header'},
    e('div',{className:'epi-logo'},'🏛️'),
    e('div',{className:'epi-meta'},
      e('div',{className:'epi-pilier'},'PIX AED · Formation Vie Scolaire'),
      e('div',{className:'epi-title'},'Simulateur Épictète'),
      e('div',{className:'epi-sub'},'Coach AED · Simulations · Évaluation PSSM')
    ),
    ready
      ?e('div',{className:'local-badge'},'IA LOCALE ✓')
      :e('div',{className:'epi-badge'},'IA · Local')
  );}

  /* ── LOADING ── */
  if(!ready){return e('div',null,e(H),
    e('div',{className:'load-screen'},
      e('div',{className:'load-icon'},'🧠'),
      e('div',{className:'load-title'},activating?'Chargement du modèle local...':'Épictète — Mode local'),
      e('div',{className:'load-sub'},
        activating
          ?loadProgress.text
          :'Ce simulateur fonctionne entièrement dans votre navigateur.\nAucune donnée n\'est envoyée à un serveur.\n\nPremier lancement : téléchargement du modèle (~500 MB, mis en cache ensuite).'
      ),
      activating&&e('div',{className:'load-bar-wrap'},
        e('div',{className:'load-bar',style:{width:Math.round((loadProgress.progress||0)*100)+'%'}})),
      activating&&e('div',{className:'load-status'},Math.round((loadProgress.progress||0)*100)+'%'),
      loadErr&&e('div',{style:{color:'#ef4444',fontSize:'.8rem',marginTop:'12px',maxWidth:'400px',margin:'12px auto 0'}},
        '⚠ ',loadErr),
      !activating&&e('button',{className:'btn-load',onClick:activateModel},'Lancer Épictète')
    )
  );}

  /* ── TABS ── */
  function Tabs(){return e('div',{className:'tabs'},
    e('button',{className:'tab'+(tab==='scenario'?' active':''),onClick:()=>{setTab('scenario');setScreen('list');}},'SIMULATIONS'),
    e('button',{className:'tab'+(tab==='coach'?' active':''),onClick:()=>setTab('coach')},'COACH')
  );}

  /* ══════════════════════════════════════════
     TAB COACH
  ══════════════════════════════════════════ */
  var PM=window.EpicteteHelpers?window.EpicteteHelpers.PILLAR_META:{};
  var SCS=window.EpicteteHelpers?window.EpicteteHelpers.SCENARIOS:{};
  var MD=window.EpicteteHelpers?window.EpicteteHelpers.MODE_DEFAULTS:{coach:{maxTokens:180,temperature:.45}};

  async function askCoach(){
    var q=coachInput.trim();
    if(!q||coachLoading)return;
    setCoachLoading(true);setCoachAnswer('');
    var promptData=window.EpicteteHelpers.buildCoachPrompt(coachPillar,q);
    var answer='';
    var result=await window.LocalLLM.ask({
      fullPrompt:promptData.full,
      options:{
        maxTokens:MD.coach.maxTokens,
        temperature:MD.coach.temperature,
        onChunk:function(chunk){answer+=chunk;setCoachAnswer(answer);}
      }
    });
    setCoachAnswer(result.text||answer);
    setCoachLoading(false);
    if(coachInputRef.current)coachInputRef.current.focus();
  }

  function renderCoach(){
    var pillarKeys=Object.keys(PM);
    return e('div',null,e(H),e(Tabs),
      e('div',{className:'screen'},
        e('div',{className:'screen-title'},'Pilier (optionnel)'),
        e('div',{className:'pillar-grid'},
          pillarKeys.map(function(pk){
            var m=PM[pk]||{};
            return e('div',{key:pk,className:'pillar-card'+(coachPillar===pk?' active':''),
              onClick:()=>setCoachPillar(coachPillar===pk?null:pk)},
              e('div',{className:'pillar-icon'},m.icon||'📚'),
              e('div',{className:'pillar-name'},pk),
              e('div',{className:'pillar-label'},m.label||pk)
            );
          })
        ),
        e('div',{className:'coach-box'},
          e('div',{className:'coach-hint'},'Posez une question sur un module, une situation, une notion clé — ou sur plusieurs piliers à la fois.'),
          e('div',{className:'coach-q'},
            e('textarea',{className:'coach-input',ref:coachInputRef,
              placeholder:'Ex. : Comment gérer un élève qui se replie sur lui-même ? Qu\'est-ce que la désescalade verbale ?',
              value:coachInput,disabled:coachLoading,
              onChange:ev=>setCoachInput(ev.target.value),
              onKeyDown:ev=>{if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();askCoach();}}}),
            e('button',{className:'btn-coach',disabled:coachLoading||!coachInput.trim(),onClick:askCoach},
              coachLoading?'..':'Demander')
          ),
          coachAnswer&&e('div',{className:'coach-answer'+(coachLoading?' streaming':'')},coachAnswer)
        )
      )
    );
  }

  /* ══════════════════════════════════════════
     TAB SIMULATION
  ══════════════════════════════════════════ */
  async function callScenario(newMsgs,sc){
    setLoading(true);setErr('');
    var messages=[{role:'system',content:sc.systemPrompt},...newMsgs];
    var answer='';
    var result=await window.LocalLLM.askMessages(messages,{
      maxTokens:MD.scenario.maxTokens,
      temperature:MD.scenario.temperature,
      onChunk:function(chunk){
        answer+=chunk;
        setMsgs(function(m){
          var last=m[m.length-1];
          if(last&&last.role==='assistant'){
            return [...m.slice(0,-1),{role:'assistant',content:answer}];
          }
          return [...m,{role:'assistant',content:answer}];
        });
      }
    });
    if(!answer&&result.text){
      setMsgs(function(m){
        var last=m[m.length-1];
        if(last&&last.role==='assistant') return m;
        return [...m,{role:'assistant',content:result.text}];
      });
    }
    setExchanges(x=>x+1);
    setLoading(false);
    if(inputRef.current)inputRef.current.focus();
  }

  function startScenario(sc){
    setScenario(sc);setMsgs([]);setExchanges(0);setErr('');setScreen('chat');
  }

  async function send(){
    var txt=input.trim();
    if(!txt||loading)return;
    var userMsg={role:'user',content:txt};
    var newMsgs=[...msgs,userMsg];
    setMsgs(newMsgs);setInput('');
    await callScenario(newMsgs,scenario);
  }

  async function evaluate(){
    setScreen('evaluating');setLoading(true);setErr('');
    var transcript=msgs.map(function(m){return(m.role==='user'?'AED':'ÉLÈVE')+' : '+m.content;}).join('\n');
    var evalMsgs=window.EpicteteHelpers.buildEvalPrompt(transcript,scenario.id);
    var answer='';
    var result=await window.LocalLLM.askMessages(
      evalMsgs.slice(1), // system is first message — pass user turn
      {
        maxTokens:window.EpicteteHelpers.MODE_DEFAULTS.eval.maxTokens,
        temperature:window.EpicteteHelpers.MODE_DEFAULTS.eval.temperature
      }
    );
    // Rebuild with system
    var evalResult=await window.LocalLLM.ask({
      systemPrompt:evalMsgs[0].content,
      userPrompt:evalMsgs[1].content,
      options:{
        maxTokens:window.EpicteteHelpers.MODE_DEFAULTS.eval.maxTokens,
        temperature:window.EpicteteHelpers.MODE_DEFAULTS.eval.temperature
      }
    });
    setEvaluation(evalResult.text||'Évaluation indisponible.');
    setScreen('evaluation');setLoading(false);
  }

  function restart(){setScreen('list');setMsgs([]);setExchanges(0);setEvaluation('');setErr('');}

  function renderScenarioList(){
    var scList=window.EpicteteHelpers?Object.values(window.EpicteteHelpers.SCENARIOS):[];
    return e('div',null,e(H),e(Tabs),
      e('div',{className:'screen'},
        e('div',{className:'screen-title'},'Choisir un scénario'),
        e('div',{className:'sc-grid'},
          scList.map(function(sc){return e('div',{key:sc.id||sc.name,className:'sc-card'},
            e('div',{className:'sc-icon'},sc.icon),
            e('div',{className:'sc-content'},
              e('div',{className:'sc-header'},
                e('div',{className:'sc-name'},sc.name),
                e('div',{className:'sc-diff',style:{background:sc.diffBg,color:sc.diffColor}},sc.difficulty)
              ),
              e('div',{className:'sc-ctx'},sc.context),
              e('div',{className:'sc-tip'},'💡 ',sc.tip),
              e('button',{className:'sc-cta',onClick:()=>startScenario(sc)},'DÉMARRER')
            )
          );})
        )
      )
    );
  }

  function renderChat(){
    return e('div',null,e(H),e(Tabs),
      e('div',{className:'chat-banner'},
        e('div',{className:'chat-persona'},
          e('div',{className:'chat-persona-icon'},scenario.icon),
          e('div',null,
            e('div',{className:'chat-persona-name'},scenario.name),
            e('div',{className:'chat-persona-sub'},scenario.subtitle)
          )
        ),
        e('div',{className:exchanges>=6?'chat-counter warn':'chat-counter'},exchanges+' échanges'),
        e('button',{className:'btn btn-sec',style:{fontSize:'.65rem',padding:'6px 12px'},onClick:()=>setScreen('list')},'◄ Scénarios')
      ),
      e('div',{className:'chat-window'},
        msgs.length===0&&e('div',{style:{textAlign:'center',padding:'40px 0',color:'var(--text-d)'}},
          e('div',{style:{fontSize:'2rem',marginBottom:'8px'}},scenario.icon),
          e('div',null,'Adressez-vous à ',e('b',{style:{color:'var(--text-m)'}},scenario.name),'.'),
          e('div',{style:{marginTop:'4px',fontSize:'.78rem'}},scenario.tip)
        ),
        msgs.map(function(m,i){
          return e('div',{key:i,className:'bubble-wrap-'+(m.role==='user'?'user':'ai')},
            e('div',{className:'bubble-'+(m.role==='user'?'user':'ai')},
              e('div',{className:'bubble-label '+(m.role==='user'?'bubble-label-user':'bubble-label-ai')},
                m.role==='user'?'AED':scenario.name.toUpperCase()),
              m.content
            )
          );
        }),
        loading&&msgs[msgs.length-1]&&msgs[msgs.length-1].role==='user'&&
          e('div',{className:'bubble-wrap-ai'},
            e('div',{className:'bubble-ai'},
              e('div',{className:'bubble-label bubble-label-ai'},scenario.name.toUpperCase()),
              e('div',{className:'typing'},e('div',{className:'dot'}),e('div',{className:'dot'}),e('div',{className:'dot'}))
            )
          ),
        e('div',{ref:bottomRef})
      ),
      err&&e('div',{className:'err-bar'},'⚠ ',err),
      e('div',{className:'chat-input-row'},
        e('textarea',{className:'chat-input',ref:inputRef,
          placeholder:'Votre intervention...',
          value:input,disabled:loading,
          onChange:ev=>setInput(ev.target.value),
          onKeyDown:ev=>{if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();send();}}}),
        e('button',{className:'btn-send',disabled:loading||!input.trim(),onClick:send},'ENVOYER'),
        exchanges>=3&&e('button',{className:'btn-eval',disabled:loading,onClick:evaluate},'ÉVALUER')
      )
    );
  }

  function renderEvaluating(){
    return e('div',null,e(H),
      e('div',{className:'eval-loading'},
        e('div',{className:'eval-loading-icon'},'⚖️'),
        e('div',{className:'eval-loading-title'},'Épictète analyse...'),
        e('div',{className:'eval-loading-sub'},'Évaluation de votre intervention en cours.')
      )
    );
  }

  function renderEvaluation(){
    return e('div',null,e(H),
      e('div',{className:'screen'},
        e('div',{className:'screen-title'},'🏛️ Simulation : ',e('b',null,scenario.name),' — ',scenario.subtitle),
        e('div',{className:'eval-result'},evaluation),
        e('div',{className:'eval-restart'},
          e('button',{className:'btn btn-sec',onClick:()=>{setScreen('chat');setErr('')}},'◄ REVOIR'),
          e('button',{className:'btn btn-pri',onClick:()=>startScenario(scenario)},'⟳ REJOUER'),
          e('button',{className:'btn btn-gold',onClick:restart},'← SCÉNARIOS')
        )
      )
    );
  }

  /* ── ROUTING ── */
  if(tab==='coach') return renderCoach();
  if(screen==='list') return renderScenarioList();
  if(screen==='chat') return renderChat();
  if(screen==='evaluating') return renderEvaluating();
  if(screen==='evaluation') return renderEvaluation();
  return renderScenarioList();
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
