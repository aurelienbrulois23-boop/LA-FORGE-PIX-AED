<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_POS01 — Autorité éducative vs autoritarisme</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#3b82f6;--acc-d:#1d4ed8;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.06) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;
  box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';
  font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);
  padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;
  font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);
  border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;
  font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);
  border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;
  font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;
  color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;
  display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;
  cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;
  font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(59,130,246,.06);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);
  padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);
  padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);
  padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;
  transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.12);
  padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;
  margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_POS01';
var CERT_KEY  = 'CERT_AED_AED_POS01';
var BACK_URL  = 'index.html';

var SCENARIOS = [
  {
    ctx: "Mardi 10h15, couloir du 2e étage. Deux élèves de 4e se poussent violemment. L’un insulte l’autre. Vous arrivez seul·e. Pas d’autre adulte en vue. Les deux sont rouges de colère.",
    q: "Quelle est votre première action ?",
    options: [
      {
        label: "Posture Structurante",
        text: "Je m’interpose physiquement (sans contact), voix ferme et basse : 'Stop. On se sépare. Toi ici, toi là-bas.' Je ne demande pas d’explications maintenant — je sécurise d’abord, j’écoute ensuite.",
        score: 3,
        fb: "C’est l’autorité éducative en acte : sécuriser d’abord, comprendre ensuite. La voix basse oblige à écouter (contrairement au cri qui escalade). La séparation physique casse la boucle émotionnelle. Vous n’avez pas besoin de comprendre pour intervenir — vous avez besoin de calme pour comprendre.",
        good: true
      },
      {
        label: "Posture Investigatrice",
        text: "Je demande immédiatement : 'Qu’est-ce qui se passe ici ?' pour comprendre la situation avant d’agir.",
        score: 1,
        fb: "L’intention est bonne — comprendre avant de juger. Mais le timing est mauvais. Deux ados en pleine décharge amygdalienne ne peuvent pas verbaliser rationnellement. Demander des explications maintenant, c’est ajouter de la pression cognitive à une surcharge émotionnelle. Résultat probable : escalade.",
        good: false
      },
      {
        label: "Posture Autoritaire",
        text: "Je crie fort pour qu’ils s’arrêtent : 'ÇA SUFFIT ! Vous deux, chez le CPE, IMMÉDIATEMENT !'",
        score: 0,
        fb: "Le cri est contagieux : il élève le niveau de tension au lieu de l’abaisser. Et l’envoi immédiat au CPE, sans rien sécuriser, risque de relancer le conflit dans le couloir. L’autoritarisme n’est pas l’autorité — c’est la panique déguisée en fermeté. Prairat dirait : 'Vous avez sanctionné, mais vous n’avez pas éduqué.'",
        good: false
      }
    ]
  },
  {
    ctx: "Les deux élèves sont maintenant séparés. L’un pleure, l’autre croise les bras et ricane. Vous devez décider de la suite.",
    q: "Comment gérez-vous les deux élèves ?",
    options: [
      {
        label: "Traitement Différencié",
        text: "Je prends 30 secondes avec celui qui pleure : 'Ça va aller, on va régler ça.' Puis je m’adresse à l’autre calmement : 'Le ricanement, je l’ai vu. On en reparlera. Pour l’instant, tu restes ici.' Je les accompagne séparément au bureau vie scolaire.",
        score: 3,
        fb: "L’autorité éducative lit les besoins différents : l’un a besoin d’être rassuré, l’autre d’être contenu. Nommer le ricanement sans s’y opposer frontalement ('je l’ai vu') suffit à signaler que le comportement est enregistré — sans offrir la confrontation que l’ado cherche peut-être.",
        good: true
      },
      {
        label: "Traitement Égalitaire Strict",
        text: "Je traite les deux exactement pareil : 'Vous êtes tous les deux en tort. Direction bureau vie scolaire.'",
        score: 1,
        fb: "L’égalité de traitement semble juste, mais elle nie la réalité de la situation. Si l’un est agresseur et l’autre victime, les traiter identiquement, c’est victimiser une deuxième fois. L’équité (adapter selon les besoins) n’est pas l’inégalité — c’est la justice en contexte.",
        good: false
      },
      {
        label: "Confrontation du Ricaneur",
        text: "Je me plante devant celui qui ricane : 'Tu trouves ça drôle ? Tu vas moins rigoler quand le CPE va appeler tes parents.'",
        score: 0,
        fb: "C’est la confrontation directe que l’ado provoque. Tomber dedans, c’est lui donner le pouvoir de fixer le cadre émotionnel de l’échange. Et la menace des parents en public est une humiliation — elle ne produit pas de la réflexion, elle produit de la rancœur.",
        good: false
      }
    ]
  },
  {
    ctx: "Le lendemain, vous croisez le ricaneur dans la cour. Il vous regarde et détourne la tête. Pas d’hostilité, mais pas de salut non plus.",
    q: "Que faites-vous ?",
    options: [
      {
        label: "Maintien du Lien",
        text: "Je passe près de lui et je dis simplement : 'Salut, Kévin.' Sans insister. Sans reparler de hier. Je signale que la relation n’est pas rompue — le conflit d’hier n’a pas effacé la personne.",
        score: 3,
        fb: "C’est le geste le plus puissant et le plus sous-estimé de l’autorité éducative : maintenir le lien après le cadrage. Le message implicite est : 'Je t’ai recadré parce que c’était nécessaire, pas parce que je te rejette.' Prairat appelle ça l’autorité qui 'autorise' — qui fait grandir plutôt qu’exclure.",
        good: true
      },
      {
        label: "Rappel des Faits",
        text: "Je lui rappelle la scène d’hier : 'J’espère que tu as compris que ce genre de comportement ne passe pas.'",
        score: 1,
        fb: "La leçon de morale après coup est rarement efficace. L’ado l’a déjà entendue hier, du CPE, peut-être de ses parents. Ce qu’il n’a pas eu, en revanche, c’est un adulte qui lui montre que le cadrage n’est pas de la rancune. Répéter le reproche, c’est enfermer l’élève dans la faute.",
        good: false
      },
      {
        label: "Indifférence",
        text: "Je ne fais rien. Il n’est pas venu me saluer, je ne vais pas le forcer.",
        score: 0,
        fb: "L’indifférence n’est pas de la neutralité — c’est un message. L’élève peut interpréter votre silence comme : 'Cet adulte ne m’a pas pardonné.' La relation éducative, contrairement à la relation d’autorité pure, exige un geste de continuité après le conflit. C’est à l’adulte de le faire.",
        good: false
      }
    ]
  }
];

var SYNTHESIS = [
  {icon:"\u{1F6E1}", t:"Autorit\u00e9 \u00e9ducative :", v:"S\u00e9curiser d’abord, comprendre ensuite, maintenir le lien apr\u00e8s. La s\u00e9quence est non n\u00e9gociable."},
  {icon:"\u26A0\uFE0F", t:"Autoritarisme :", v:"Le cri, la menace, l’humiliation publique. \u00c7a produit de la soumission temporaire, pas de l'\u00e9ducation. Et \u00e7a cr\u00e9e de la rancune durable."},
  {icon:"\u{1F9E0}", t:"Prairat :", v:"L’autorit\u00e9 juste est celle qui 'autorise' \u2014 qui fait grandir. La sanction sans r\u00e9int\u00e9gration est une exclusion d\u00e9guis\u00e9e."},
  {icon:"\u{1F91D}", t:"Apr\u00e8s le cadrage :", v:"Le geste de maintien du lien est aussi important que le cadrage lui-m\u00eame. C’est l\u00e0 que l’autorit\u00e9 devient \u00e9ducative."}
];

function getPlayer(){
  try{
    var u=new URLSearchParams(window.location.search),p=u.get('player');
    if(p&&p.length>2){
      localStorage.setItem('pvs_current_player',p);
      localStorage.setItem('pvs_aed_player',p);
      return p;
    }
  }catch(ex){}
  return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';
}
function awardXP(){
  try{
    var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : Autorit\u00e9 \u00e9ducative vs autoritarisme',
      d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();
    setStep('complete');
  };

    var goBack=function(){
    var p=getPlayer();
    var sep=BACK_URL.indexOf('?')===-1?'?':'&';
    window.location.href=p&&p!=='anonyme'?BACK_URL+sep+'player='+encodeURIComponent(p):BACK_URL;
  };
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};

  var handleChoice=function(opt){
    setScore(score+opt.score);
    setFeedback(opt);
  };

  var nextScenario=function(){
    setFeedback(null);
    if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}
    else{setStep('synthesis');}
  };

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Posture & D\u00e9ontologie \u00B7 Module 1/5'),
    e('h1',null,"Autorit\u00e9 \u00e9ducative vs autoritarisme"),
    e('p',{className:'quote'},"\"L’autorit\u00e9 n’est pas un pouvoir qu’on exerce sur l’autre, c’est une confiance qu’on inspire \u00e0 l’autre.\" \u2014 Eirick Prairat"),
    e('p',null,"Un AED qui crie fort n’a pas plus d’autorit\u00e9 qu’un prof qui chuchote et que toute la classe \u00e9coute. La diff\u00e9rence entre les deux n’est pas le volume \u2014 c’est la posture. L’autorit\u00e9 \u00e9ducative s\u00e9curise, structure et maintient le lien. L’autoritarisme menace, humilie et rompt."),
    e('p',null,"Ce module vous confronte \u00e0 trois sc\u00e9narios de vie scolaire. Chaque choix r\u00e9v\u00e8le une posture. Pas de bonne r\u00e9ponse unique \u2014 mais des postures qui fonctionnent mieux que d’autres, et on vous dit pourquoi."),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00e9f\u00e9rences : '),
      "Eirick Prairat, ",e('em',null,"La sanction en \u00e9ducation")," \u2014 Daniel Favre, ",e('em',null,"Cessons de d\u00e9motiver les \u00e9l\u00e8ves")," \u2014 Rapport EEF ",e('em',null,"Improving Behaviour in Schools")),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +80 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Posture'),
      e('div',{className:'comp-earn'},'+Cadrage')),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00e9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];
    var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00e9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback ?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :
        e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00e9e':'\u26A0\uFE0F Point d\'am\u00e9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00e9nario suivant \u2192':'Synth\u00e8se \u2192'))
    );
  };

  var renderSynthesis=function(){
    var maxScore=SCENARIOS.length*3;
    var pctScore=Math.round((score/maxScore)*100);
    var verdict=pctScore>=80?"Posture solide \u2014 vous distinguez clairement autorit\u00e9 et autoritarisme."
      :pctScore>=50?"Des r\u00e9flexes \u00e0 affiner \u2014 la th\u00e9orie est l\u00e0, la pratique viendra."
      :"Des bases \u00e0 retravailler \u2014 ce module m\u00e9rite un second passage.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00e8se'),
      e('h2',null,"Ce qu’il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Votre score : '),score+'/'+maxScore+' ('+pctScore+'%) \u2014 '+verdict),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'\u{1F6E1}'),
    e('h1',null,"Module valid\u00e9 !"),
    e('p',{style:{textAlign:'center'}},"L’autorit\u00e9 \u00e9ducative, c’est s\u00e9curiser, structurer, et maintenir le lien."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +80 XP envoy\u00e9s au Portail'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Posture'),
      e('div',{className:'comp-earn'},'+1 Cadrage')),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00e0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();
    case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();
    case 'complete':return renderComplete();
    default:return renderIntro();
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
