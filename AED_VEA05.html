<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_VEA05 — Animer la cohésion : gestes et rituels</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#22c55e;--acc-d:#16a34a;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.05) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--green);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#000;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#c4e8d0}
.insight-box strong{color:var(--green)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#22c55e;background:rgba(34,197,94,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_VEA05';
var CERT_KEY  = 'CERT_AED_AED_VEA05';
var BACK_URL  = 'index.html';

var SCENARIOS = [
  {
    ctx: "Le CPE vous propose de créer un 'temps de lancement' au début des permanences du lundi : 5 minutes structurées pour que les élèves arrivent autrement que dans le bruit et l'agitation. Il vous laisse carte blanche pour imaginer ce temps.",
    q: "Que proposez-vous ?",
    options: [
      {
        label: "Rituel de lancement simple et régulier",
        text: "'Je propose un tour de table express : chaque élève dit un mot (une émotion, un mot sur leur week-end, ou juste «ça va/ça va pas»). Pas d'obligation de développer. C'est rapide, ça crée une présence collective, et ça permet de repérer les élèves en difficulté sans les cibler.'",
        score: 3,
        fb: "Les rituels de cohésion ont deux fonctions : créer un sentiment d'appartenance (Maslow, besoin d'affiliation) et permettre à l'adulte d'observer le groupe en mode 'météo émotionnelle'. Le mot unique respecte le droit au silence tout en créant un espace partagé. Réplicable, simple, non intrusif : c'est exactement ce qui tient dans le temps.",
        good: true
      },
      {
        label: "Activité élaborée",
        text: "'Je prépare chaque semaine un jeu de coopération différent, avec du matériel. J'avais pensé à un brise-glace avec des cartes.'",
        score: 1,
        fb: "L'activité élaborée peut fonctionner ponctuellement, mais elle est difficile à tenir durablement (préparation, matériel, imprévus). Les rituels les plus efficaces sont ceux qui peuvent tenir sans préparation. La régularité est plus puissante que la qualité de l'activité unique.",
        good: false
      },
      {
        label: "Laisser les élèves faire",
        text: "'On pourrait leur demander ce qu'ils veulent faire de ce temps-là. C'est leur permanence après tout.'",
        score: 1,
        fb: "Donner la parole aux élèves sur l'organisation de leur espace est une bonne pratique de démocratie participative — mais elle suppose un cadre déjà établi. Sans rituel de base, la question ouverte peut créer du chaos ou de l'indifférence. Construire d'abord, co-construire ensuite.",
        good: false
      },
    ]
  },
  {
    ctx: "Vous supervisez un groupe de 4ème en permanence. Depuis quelques semaines, un petit clique d'élèves monopolise les meilleures places, exclut les autres avec des remarques, et crée une ambiance délétère dans l'espace.",
    q: "Comment intervenez-vous sur la dynamique de groupe ?",
    options: [
      {
        label: "Reconfiguration de l'espace + règle collective",
        text: "'J'annonce une règle de rotation des places, valable pour tout le groupe : chaque semaine, les positions changent. Je le formule comme une règle collective, pas comme une sanction du groupe dominant. J'explique pourquoi : «Pour que tout le monde puisse travailler dans de bonnes conditions.»'",
        score: 3,
        fb: "La reconfiguration spatiale est un outil de management de groupe sous-estimé. Elle brise les hiérarchies territoriales sans cibler personne individuellement. Présentée comme règle collective neutre, elle évite la confrontation directe avec le groupe dominant tout en modifiant structurellement la dynamique. C'est de l'ingénierie sociale douce.",
        good: true
      },
      {
        label: "Confrontation directe avec le groupe",
        text: "'Je convoque les meneurs et leur dis que leur comportement est inacceptable. Ils changent ou je rapporte au CPE.'",
        score: 1,
        fb: "La confrontation directe peut être nécessaire dans les cas graves, mais elle crée souvent une résistance collective renforcée ('on nous punit'). Elle isole les individus sans changer la dynamique systémique. L'intervention sur la structure (l'espace, la règle collective) est plus durable.",
        good: false
      },
      {
        label: "Ignorer en espérant que ça passe",
        text: "'Je surveille mais je n'interviens pas encore. C'est un peu normal à cet âge d'avoir des petits groupes.',",
        score: 0,
        fb: "Les dynamiques de groupe exclusives, si elles ne sont pas nommées et reconfigurées, s'installent et s'aggravent. L'exclusion systématique d'un espace commun est une forme de harcèlement relationnel. Intervenir tôt, sans dramatiser, sur la structure du groupe est toujours plus efficace qu'attendre une escalade.",
        good: false
      },
    ]
  },
  {
    ctx: "Un groupe de 5ème vient de terminer un travail collectif en permanence (révisions de groupe organisées par vous). Le résultat était de bonne qualité — ils ont collaboré, s'entraidé, et plusieurs élèves timides ont pris la parole.",
    q: "Comment valorisez-vous la contribution collective ?",
    options: [
      {
        label: "Reconnaissance collective et spécifique",
        text: "'Je dis à l'ensemble du groupe, en les regardant : «Ce que vous venez de faire, s'entraider, écouter ceux qui ont du mal à parler, c'est exactement ce que veut dire travailler en groupe. Je l'ai observé et ça m'a impressionné.» Je nomme sans comparer à d'autres groupes.",
        score: 3,
        fb: "La reconnaissance collective renforce le sentiment de groupe et le sentiment d'appartenance (Deci & Ryan). Être nommé comme 'ce groupe qui a fait X' crée une identité collective positive. Nommer des comportements spécifiques ('s'entraider', 'laisser de la place aux autres') permet aux élèves de savoir ce qu'on valorise précisément — et donc de le reproduire.",
        good: true
      },
      {
        label: "Félicitations individuelles",
        text: "'Je repère les trois élèves les plus actifs et je les félicite séparément.'",
        score: 1,
        fb: "Féliciter les individus dans une dynamique collective peut créer de la compétition ('pourquoi pas moi ?') et efface l'effort collectif. Si on veut renforcer la coopération, c'est la coopération qu'on valorise — pas les individus qui ont émergé.",
        good: false
      },
      {
        label: "Passer à autre chose",
        text: "'Bon, c'était bien. Allez, rangez vos affaires.'",
        score: 0,
        fb: "Les moments de travail collectif réussi sont rares et précieux. Les laisser passer sans nommage explicite prive le groupe d'un ancrage mémoriel positif ('on a réussi ça ensemble'). Le nommage crée la mémoire collective — et la mémoire collective est la base de la cohésion.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"🔄", t:"Le rituel comme fondation :", v:"Un rituel de 5 minutes, régulier et simple, vaut plus que dix animations élaborées. La régularité crée la sécurité. La sécurité permet l'appartenance. L'appartenance génère la coopération."},
  {icon:"🏗️", t:"Agir sur la structure, pas sur les individus :", v:"Reconfigurer l'espace, changer les places, introduire une règle collective — ces actions modifient la dynamique de groupe sans cibler personne. C'est de l'architecture éducative douce."},
  {icon:"🌟", t:"Nommer le collectif :", v:"Valoriser le groupe comme acteur ('vous avez fait X ensemble') crée une identité collective positive. Les groupes qui ont une mémoire de réussite partagée sont plus résilients et plus cohésifs."},
  {icon:"🕐", t:"Le temps long de la cohésion :", v:"La cohésion ne se décrète pas en un jour. Elle se construit par accumulation de petits gestes, de règles tenues, de reconnaissances sincères. L'AED, par sa présence régulière, est l'acteur le mieux placé pour cette construction silencieuse."},
];

function getPlayer(){try{var u=new URLSearchParams(window.location.search),p=u.get('player');if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);localStorage.setItem('pvs_aed_player',p);return p;}}catch(ex){}return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';}
function awardXP(){try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),module:MODULE_ID,cpTotal:0,label:"LA FORGE : Animer la cohésion",d:new Date().toISOString()});if(evts.length>700)evts.splice(0,evts.length-700);localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));}catch(ex){}}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];
  var finish=function(){localStorage.setItem(CERT_KEY,JSON.stringify({v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true}));awardXP();setStep('complete');};
  var goBack=function(){var p=getPlayer();window.location.href=p&&p!=='anonyme'?BACK_URL+'?player='+encodeURIComponent(p):BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'🌐 ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'← La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Vivre Ensemble Actif · Module 5/6'),
    e('h1',null,"Animer la cohésion : gestes et rituels"),
    e('p',{className:'quote'},'"'+"La cohésion n'est pas un sentiment — c'est le résultat de pratiques répétées, de règles partagées, et de mémoires collectives construites ensemble."+'" — d\'après Dominique Oberlé, Psychologie sociale des groupes'),
    e('p',null,"Un groupe scolaire est d'abord un agrégat d'individus. La cohésion, ce qui fait que ce groupe devient capable de coopérer, de se soutenir, d'avoir une identité collective, ne vient pas toute seule. Elle se construit, par des rituels, des règles, des mémoires partagées."),
    e('p',null,"En permanence, en cour, dans les espaces de vie scolaire, l'AED est l'adulte qui peut agir sur cette construction de manière continue. Ce module explore trois leviers concrets : le rituel de lancement, l'intervention sur la dynamique de groupe, et la valorisation collective."),
    e('div',{className:'insight-box'},e('strong',null,'📚 Références : '),"Dominique Oberlé, Psychologie sociale des groupes scolaires — Abraham Maslow, Théorie des besoins (appartenance) — Deci & Ryan, Théorie de l\'autodétermination"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},e('div',{className:'xp-badge'},'⚡ +100 XP'),e('span',{style:{margin:'0 6px'}}),e('div',{className:'comp-earn'},'+Cohésion'),e('div',{className:'comp-earn'},'+Leadership'),null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le scénario')
  );};

  var renderScenario=function(){var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),e('div',{className:'step-tag'},'Scénario '+(sIdx+1)+' / '+SCENARIOS.length),e('div',{className:'scenario-ctx'},e('strong',null,'📍 Contexte : '),sc.ctx),e('h2',null,sc.q),
      !feedback?sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,e('div',{className:'fb-box '+(feedback.good?'good':'warn')},e('strong',null,feedback.good?'✅ Posture adaptée':'⚠️ Point d\'amélioration'),e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Scénario suivant →':'Synthèse →'))
    );};

  var renderSynthesis=function(){var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);var v=pc>=80?"Compétence solide.":pc>=50?"Des réflexes à affiner.":"À retravailler.";
    return e('div',{className:'card'},e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),e('div',{className:'step-tag'},'Synthèse'),e('h2',null,"Ce qu'il faut retenir"),e('div',{className:'insight-box'},e('strong',null,'🎯 Score : '),score+'/'+mx+' ('+pc+'%) — '+v),e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),e('button',{className:'btn',onClick:finish},'Valider ce module →'));};

  var renderComplete=function(){return e('div',{className:'card'},e('div',{className:'seal'},'🌐'),e('h1',null,"Module validé !"),e('p',{style:{textAlign:'center'}},"Vous avez les outils pour construire la cohésion — rituel, structure, reconnaissance. Le groupe va vous le rendre."),e('div',{style:{textAlign:'center',margin:'10px 0'}},e('div',{className:'xp-badge'},'⚡ +100 XP'),e('span',{style:{margin:'0 6px'}}),e('div',{className:'comp-earn'},'+1 Cohésion'),e('div',{className:'comp-earn'},'+1 Leadership'),null),e('button',{className:'btn',onClick:goBack},'← Retour à La Forge'));};

  switch(step){case 'intro':return renderIntro();case 'scenario':return renderScenario();case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();default:return renderIntro();}
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
