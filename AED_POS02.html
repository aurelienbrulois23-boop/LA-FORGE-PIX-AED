<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_POS02 \u2014 La juste distance professionnelle</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#3b82f6;--acc-d:#1d4ed8;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.06) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_POS02';
var CERT_KEY  = 'CERT_AED_AED_POS02';
var BACK_URL  = 'index_PIX_AED.html';

var SCENARIOS = [
  {
    ctx: "Un \\u00e9l\\u00e8ve de 3\\u00e8me que vous encadrez en \\u00e9tude vous envoie une demande d\\u2019ami sur Instagram. Il vous appr\\u00e9cie visiblement et vous dit en cours : \\u00abVous \\u00eates le seul adulte cool ici.\\u00bb",
    q: "Comment g\\u00e9rez-vous la demande et le compliment ?",
    options: [
      {
        label: "Refus clair + valorisation du lien r\\u00e9el",
        text: "Je refuse la demande Instagram. En pr\\u00e9sentiel, je lui dis : \\u00abMerci, \\u00e7a me fait plaisir. Mais mon r\\u00f4le ici, c\\u2019est d\\u2019\\u00eatre un adulte fiable, pas un pote. Les r\\u00e9seaux, c\\u2019est ton espace \\u00e0 toi \\u2014 ici, on se parle pour de vrai.\\u00bb",
        score: 3,
        fb: "Le refus prot\\u00e8ge l\\u2019\\u00e9l\\u00e8ve ET l\\u2019AED. Un lien num\\u00e9rique brouille les fronti\\u00e8res (horaires, contenu, intimit\\u00e9). Valoriser le lien r\\u00e9el sans rejeter l\\u2019\\u00e9l\\u00e8ve est la cl\\u00e9 : on refuse le canal, pas la relation.",
        good: true
      },
      {
        label: "Accepter pour garder le lien",
        text: "J\\u2019accepte \\u2014 \\u00e7a me permet de garder un \\u0153il sur lui et de maintenir la relation.",
        score: 0,
        fb: "Accepter cr\\u00e9e une zone grise : l\\u2019\\u00e9l\\u00e8ve voit vos publications priv\\u00e9es, vous voyez les siennes. En cas de conflit ou d\\u2019incident, cette proximit\\u00e9 num\\u00e9rique peut \\u00eatre utilis\\u00e9e contre vous. C\\u2019est un risque professionnel r\\u00e9el.",
        good: false
      },
      {
        label: "Ignorer sans r\\u00e9pondre",
        text: "Je ne r\\u00e9ponds pas \\u00e0 la demande et je ne lui en parle pas.",
        score: 1,
        fb: "L\\u2019absence de r\\u00e9ponse laisse l\\u2019\\u00e9l\\u00e8ve dans l\\u2019incertitude. Il peut interpr\\u00e9ter le silence comme du rejet. Un refus explicite et bienveillant est plus \\u00e9ducatif.",
        good: false
      },
    ]
  },
  {
    ctx: "Une \\u00e9l\\u00e8ve de 4\\u00e8me vous confie en pleurant qu\\u2019elle se dispute avec sa m\\u00e8re tous les soirs et qu\\u2019elle \\u00abn\\u2019en peut plus\\u00bb. Elle vous demande de ne rien dire \\u00e0 personne.",
    q: "Que faites-vous ?",
    options: [
      {
        label: "\\u00c9couter + cadrer la confidentialit\\u00e9",
        text: "J\\u2019\\u00e9coute attentivement sans couper. Puis : \\u00abJe suis content que tu me fasses confiance. Je ne vais pas raconter \\u00e7a \\u00e0 tout le monde. Mais si je pense que tu es en danger, j\\u2019ai le devoir d\\u2019en parler \\u00e0 quelqu\\u2019un qui peut t\\u2019aider \\u2014 le CPE ou l\\u2019infirmi\\u00e8re. C\\u2019est pas te trahir, c\\u2019est te prot\\u00e9ger.\\u00bb",
        score: 3,
        fb: "L\\u2019AED n\\u2019est pas un confident priv\\u00e9. La promesse de secret total est un pi\\u00e8ge : si la situation s\\u2019aggrave, vous \\u00eates coinc\\u00e9. Poser le cadre d\\u2019embl\\u00e9e (\\u00absi danger, je transmets\\u00bb) est honn\\u00eate et prot\\u00e8ge tout le monde.",
        good: true
      },
      {
        label: "Promettre le secret",
        text: "\\u00abT\\u2019inqui\\u00e8te, je dirai rien \\u00e0 personne, promis.\\u00bb",
        score: 0,
        fb: "La promesse de secret absolu est une erreur professionnelle. Si la situation s\\u2019aggrave (scarification, fugue, maltraitance), vous \\u00eates pris entre votre promesse et votre devoir. L\\u2019\\u00e9l\\u00e8ve a besoin d\\u2019un adulte fiable, pas d\\u2019un complice.",
        good: false
      },
      {
        label: "Orienter imm\\u00e9diatement",
        text: "\\u00abVa voir l\\u2019infirmi\\u00e8re, c\\u2019est pas de mon ressort.\\u00bb",
        score: 1,
        fb: "L\\u2019orientation est pertinente, mais la mani\\u00e8re compte. L\\u2019\\u00e9l\\u00e8ve vient de se mettre \\u00e0 nu \\u00e9motionnellement \\u2014 la renvoyer sans \\u00e9couter d\\u2019abord, c\\u2019est l\\u2019humilier. \\u00c9couter, accueillir, PUIS orienter.",
        good: false
      },
    ]
  },
  {
    ctx: "Vous supervisez la cour. Un groupe de 3\\u00e8me vous interpelle par votre pr\\u00e9nom et vous tutoie. Certains vous appellent \\u00abfr\\u00e8re\\u00bb.",
    q: "Comment r\\u00e9agissez-vous ?",
    options: [
      {
        label: "Recadrer avec humour",
        text: "\\u00abH\\u00e9, c\\u2019est Monsieur/Madame [nom], pas Kevin/Sabrina. On n\\u2019est pas dans la m\\u00eame \\u00e9quipe de foot. Moi je vous respecte en vous appelant par vos pr\\u00e9noms \\u2014 vous, vous me respectez en utilisant mon nom de famille.\\u00bb",
        score: 3,
        fb: "Le vouvoiement et le nom de famille ne sont pas du formalisme vide \\u2014 ils marquent la diff\\u00e9rence de statut qui permet l\\u2019autorit\\u00e9 \\u00e9ducative. Si l\\u2019AED est \\u00abfr\\u00e8re\\u00bb, il ne peut plus \\u00eatre \\u00abcelui qui cadre\\u00bb. Le recadrage avec humour passe mieux qu\\u2019une le\\u00e7on de morale.",
        good: true
      },
      {
        label: "Laisser faire",
        text: "\\u00c7a cr\\u00e9e de la proximit\\u00e9, c\\u2019est pas grave. L\\u2019important c\\u2019est qu\\u2019ils m\\u2019\\u00e9coutent.",
        score: 0,
        fb: "La familiarit\\u00e9 n\\u2019est pas le respect. Elle fonctionne tant que tout va bien \\u2014 mais le jour o\\u00f9 vous devrez intervenir fermement, le \\u00abfr\\u00e8re\\u00bb n\\u2019aura aucune l\\u00e9gitimit\\u00e9 \\u00e0 sanctionner. La distance professionnelle est un investissement \\u00e0 long terme.",
        good: false
      },
      {
        label: "S\\u2019\\u00e9nerver",
        text: "\\u00abJe ne suis PAS ton fr\\u00e8re ! Un peu de respect !\\u00bb",
        score: 1,
        fb: "Le fond est juste mais la forme est disproportionn\\u00e9e. S\\u2019\\u00e9nerver pour un \\u00abfr\\u00e8re\\u00bb montre que \\u00e7a vous touche \\u2014 et donne exactement l\\u2019arme que certains ados cherchent. Le calme est la meilleure armure.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"\u{1F4F1}", t:"R\\u00e9seaux sociaux :", v:"Aucun lien num\\u00e9rique avec les \\u00e9l\\u00e8ves. On refuse le canal, pas la relation. La protection est mutuelle."},
  {icon:"\u{1F510}", t:"Confidences :", v:"\\u00c9couter oui, promettre le secret total non. Si danger, l\\u2019AED transmet. C\\u2019est de la protection, pas de la trahison."},
  {icon:"\u{1F3AD}", t:"Tutoiement/pr\\u00e9nom :", v:"La distance formelle n\\u2019est pas de la froideur. C\\u2019est l\\u2019armature qui rend l\\u2019autorit\\u00e9 possible quand il le faut."},
  {icon:"\u2696\uFE0F", t:"Curseur mobile :", v:"La juste distance n\\u2019est pas fig\\u00e9e. Elle s\\u2019ajuste selon l\\u2019\\u00e9l\\u00e8ve, le moment, le contexte \\u2014 mais dans un cadre constant."},
];


function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function awardXP(){
  try{
    var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : La juste distance professionnelle',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){window.location.href=BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Posture & D\u00e9ontologie \u00B7 Module 1/5'),
    e('h1',null,"La juste distance professionnelle"),
    e('p',{className:'quote'},'"'+"La bonne distance, c\\u2019est celle o\\u00f9 l\\u2019\\u00e9l\\u00e8ve sent qu\\u2019on est l\\u00e0 sans qu\\u2019on soit sur lui."+'" \u2014 Mireille Cifali'),
    e('p',null,"Trop proche, on devient le copain \\u2014 et on perd la capacit\\u00e9 de cadrer. Trop loin, on devient le maton \\u2014 et on perd la confiance. La juste distance n\\u2019est pas une ligne fixe : c\\u2019est un curseur qu\\u2019on ajuste en permanence selon l\\u2019\\u00e9l\\u00e8ve, la situation et le contexte."),
    e('p',null,"Ce module explore les pi\\u00e8ges classiques (le copinage, le tutoiement, les confidences, les r\\u00e9seaux sociaux) et les rep\\u00e8res professionnels qui permettent d\\u2019\\u00eatre bienveillant sans \\u00eatre familier, pr\\u00e9sent sans \\u00eatre intrusif."),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00e9f\u00e9rences : '),"Mireille Cifali, Le lien \\u00e9ducatif \\u2014 Charte de d\\u00e9ontologie AED \\u2014 Circulaire fonctions AED 2003"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +80 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+D\u00e9onto'),e('div',{className:'comp-earn'},'+Posture'),
      null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00e9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00e9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00e9e':'\u26A0\uFE0F Point d\u2019am\u00e9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00e9nario suivant \u2192':'Synth\u00e8se \u2192'))
    );
  };

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00e9tence solide.":pc>=50?"Des r\u00e9flexes \u00e0 affiner.":"\u00c0 retravailler.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00e8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'\u{1F4F1}'),
    e('h1',null,"Module valid\u00e9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00e9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +80 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 D\u00e9onto'),e('div',{className:'comp-earn'},'+1 Posture'),
      null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00e0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
