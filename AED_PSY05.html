<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_PSY05 — La fatigue compassionnelle : prendre soin de moi</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#e2a84b;--acc-d:#b45309;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,#e2a84b22 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_PSY05';
var CERT_KEY  = 'CERT_AED_AED_PSY05';
var BACK_URL  = 'index.html';

var INTRO = {
  "pillar": "Santé Psychique · Module 5/5",
  "pos": "Bien-être professionnel",
  "title": "La fatigue compassionnelle : prendre soin de moi pour prendre soin d'eux",
  "quote": "Un adulte épuisé ne peut pas être une base sécurisante. Prendre soin de vous est une compétence professionnelle.",
  "p1": "La recherche en psychologie du travail a identifié un phénomène que l'on appelle traumatisme vicariant ou fatigue compassionnelle : ce qui se passe quand on est exposé régulièrement et de près à la souffrance d'autrui. Ce n'est pas une faiblesse — c'est de la neurologie. Ce module vous aide à le reconnaître chez vous et dans votre équipe, et à activer les bons leviers.",
  "p2": "Les symptômes ressemblent à ceux de la dépression : retrait progressif, cynisme croissant, rumination nocturne, perte du sentiment d'efficacité. Ils se développent insidieusement, exactement comme le biais de normalisation qu'on a vu dans le module 2. Ce qui vaut pour les élèves vaut aussi pour vous.",
  "refs": "Charles Figley, Compassion Fatigue — Pearlman & Saakvitne, Traumatisme vicariant — WHO, Burn-out professionnel chez les soignants — Cyrulnik, Les Vilains Petits Canards"
};

var SCENARIOS = [
  {
    "ctx": "Vous avez géré trois situations difficiles cette semaine : un signalement de violence domestique, une crise d'angoisse, un élève qui vous a confié une idée suicidaire. Le vendredi soir, vous êtes chez vous et vous pensez encore à eux. Vous dormez mal.",
    "q": "Que faites-vous de ce que vous ressentez ?",
    "options": [
      {
        "label": "Verbalisation structurée avec un pair ou le CPE",
        "text": "Lundi matin, je prends 10 minutes avec le CPE pour débriefer les trois situations. Pas pour rouvrir les dossiers — pour déposer ce que j'ai porté. Je formule : 'Cette semaine a été dense, je voudrais en parler brièvement.' Si le CPE n'est pas disponible, je fais la même chose avec un collègue de confiance.",
        "score": 3,
        "fb": "La verbalisation collective est le principal facteur de protection documenté contre la fatigue compassionnelle. La rumination solitaire amplifie la charge émotionnelle — parler la décharge. Nommer ce qu'on a vécu, l'intégrer dans un échange avec un pair, c'est ce que les psychologues appellent la 'décharge symbolique'. Ce n'est pas de la faiblesse — c'est de l'hygiène mentale professionnelle.",
        "good": true
      },
      {
        "label": "Tenir bon et ne pas en parler",
        "text": "C'est mon boulot. Je gère. On ne va pas en faire un fromage à chaque semaine difficile.",
        "score": 0,
        "fb": "Le stoïcisme professionnel est une valeur réelle — mais confondu avec le refus de verbaliser, il devient un facteur de risque. La fatigue compassionnelle s'accumule précisément parce que chaque situation isolément 'ne justifie pas' d'en parler. C'est le cumul qui use. Nommer une semaine difficile n'est pas se plaindre — c'est prendre soin de sa capacité à durer.",
        "good": false
      },
      {
        "label": "Se changer les idées par l'activité",
        "text": "Je me jette dans des activités le week-end pour ne plus y penser.",
        "score": 1,
        "fb": "La déconnexion par l'activité est utile — elle empêche la rumination passive. Mais seule, elle ne 'traite' pas la charge émotionnelle, elle la reporte. La combinaison la plus efficace : verbaliser (décharger) ET se ressourcer (se recharger). L'un sans l'autre laisse quelque chose en suspens.",
        "good": false
      }
    ]
  },
  {
    "ctx": "Un collègue AED que vous estimez se montre de plus en plus cynique depuis deux mois. Lors d'un incident avec un élève en difficulté, il dit : 'De toute façon, avec ses parents, c'est plié d'avance. On perd notre temps.' C'est la troisième fois ce mois-ci qu'il dit quelque chose de ce genre.",
    "q": "Comment réagissez-vous ?",
    "options": [
      {
        "label": "Interpeller avec bienveillance, sans jugement",
        "text": "'Dis, j'ai remarqué que ces dernières semaines, tu sembles vraiment épuisé. Le coup du 'on perd notre temps', ça ne te ressemble pas. Tu vas comment, toi ?' Je ne le juge pas sur son cynisme — je le reconnais comme un signe possible d'épuisement.",
        "score": 3,
        "fb": "Le cynisme croissant est un signal clinique de fatigue compassionnelle — pas un trait de caractère. L'interpeller sur le fond ('c'est pas vrai que c'est plié d'avance') est moins utile que de l'interpeller sur la forme ('tu sembles épuisé'). Ce que vous faites là, c'est appliquer à votre collègue exactement le regard que vous portez aux élèves : observer un changement, ne pas banaliser, ne pas juger, nommer.",
        "good": true
      },
      {
        "label": "Le contredire sur le fond",
        "text": "'Non, ça se trouve cet élève va très bien s'en sortir. Tu ne peux pas savoir.' Je remets en cause son pronostic.",
        "score": 0,
        "fb": "Contredire le contenu du cynisme ne traite pas sa source. Le collègue ne dit peut-être pas vraiment ce qu'il dit — il exprime un épuisement. Le débattre sur le fond risque de créer une joute stérile plutôt qu'une vraie conversation sur ce qu'il vit.",
        "good": false
      },
      {
        "label": "En parler au CPE sans le lui dire",
        "text": "Je le signale au CPE : 'Je suis inquiet pour mon collègue, il me semble épuisé.'",
        "score": 1,
        "fb": "Impliquer le CPE peut être pertinent si la situation dure et si votre collègue ne s'ouvre pas à vous. Mais en première intention, parler directement à lui est plus respectueux et plus efficace. Aller 'au-dessus' sans avoir essayé peut être vécu comme une trahison si il le découvre.",
        "good": false
      }
    ]
  },
  {
    "ctx": "Le CPE vous propose une réunion d'équipe mensuelle de 'décharge émotionnelle' — 30 minutes pour parler de ce que l'équipe a vécu. Un collègue résiste : 'C'est du temps perdu, on a mieux à faire.'",
    "q": "Comment valorisez-vous cette proposition ?",
    "options": [
      {
        "label": "Argument de la performance durable",
        "text": "'Je comprends que ça semble peu prioritaire. Mais si on regarde le taux de turnover des équipes AED — et le temps qu'il faut pour former un nouvel agent — 30 minutes de décharge par mois, c'est un investissement qui se rentabilise. Un agent épuisé fait des erreurs. Un agent qui dure, ça vaut quelque chose.'",
        "score": 3,
        "fb": "L'argument de la performance durable est souvent plus efficace que l'argument du bien-être pour convaincre les sceptiques. La recherche sur la fatigue compassionnelle montre que les équipes qui ont des espaces de débriefing réguliers ont un turnover plus faible, moins d'arrêts maladie, et de meilleures pratiques d'accompagnement. Le bien-être n'est pas une faveur — c'est une condition de la qualité du service.",
        "good": true
      },
      {
        "label": "Imposer la réunion comme obligatoire",
        "text": "Si le CPE la propose, tout le monde vient. C'est pas une option.",
        "score": 1,
        "fb": "Une réunion imposée sans adhésion produit peu d'effets sur la charge émotionnelle. La contrainte peut même générer une résistance qui rend l'espace encore moins utile. L'adhésion est une condition d'efficacité de ces dispositifs.",
        "good": false
      },
      {
        "label": "Laisser le collègue choisir",
        "text": "'Si tu veux pas venir, tu viens pas. C'est ton problème.'",
        "score": 0,
        "fb": "La fatigue compassionnelle dans une équipe est un problème collectif — pas individuel. Un collègue épuisé affecte la dynamique de toute l'équipe, la qualité du travail commun, et peut contaminer le moral général. Laisser le sceptique de côté, c'est laisser le problème de côté.",
        "good": false
      }
    ]
  }
];

var SYNTHESIS = [
  {
    "icon": "🔋",
    "t": "La fatigue compassionnelle :",
    "v": "Ce n'est pas une faiblesse. C'est une réponse neurologique normale à l'exposition régulière à la souffrance. Reconnaître, c'est déjà agir."
  },
  {
    "icon": "💬",
    "t": "Verbaliser, pas ruminer :",
    "v": "Parler décharge. Ruminer seul amplifie. Trouvez votre espace : CPE, collègue de confiance, supervision."
  },
  {
    "icon": "👁",
    "t": "Repérer chez les autres :",
    "v": "Cynisme croissant, 'on perd notre temps', retrait progressif — ce sont des signaux chez les collègues comme chez les élèves."
  },
  {
    "icon": "⏱",
    "t": "La performance durable :",
    "v": "Prendre soin de soi n'est pas un luxe. C'est la condition pour durer, pour être présent, pour rester un adulte fiable."
  }
];


function getPlayer(){
  try{var u=new URLSearchParams(window.location.search),p=u.get('player');
    if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);localStorage.setItem('pvs_aed_player',p);return p;}}catch(ex){}
  return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';
}
function awardXP(){
  try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : La fatigue compassionnelle : prendre soin de moi',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){
    var p=getPlayer(),sep=BACK_URL.indexOf('?')===-1?'?':'&';
    window.location.href=(p&&p!=='anonyme')?BACK_URL+sep+'player='+encodeURIComponent(p):BACK_URL;
  };
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},INTRO.pillar+' \u00B7 '+INTRO.pos),
    e('h1',null,INTRO.title),
    e('p',{className:'quote'},'"'+INTRO.quote+'"'),
    e('p',null,INTRO.p1),
    e('p',null,INTRO.p2),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00E9f\u00E9rences : '),INTRO.refs),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +80 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Bien-être'),e('div',{className:'comp-earn'},'+Équipe'),null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00E9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00E9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00E9e':'\u26A0\uFE0F Point d\u2019am\u00E9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00E9nario suivant \u2192':'Synth\u00E8se \u2192'))
    );};

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00E9tence solide.":pc>=50?"Des r\u00E9flexes \u00E0 affiner.":"\u00C0 retravailler en \u00E9quipe.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00E8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );};

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'🛡️'),
    e('h1',null,"Module valid\u00E9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00E9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +80 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Bien-être professionnel'),e('div',{className:'comp-earn'},'+1 Intelligence collective'),null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00E0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
