<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_CRI03 \u2014 Protocole pHARe en situation</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#f97316;--acc-d:#c2410c;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(249,115,22,.06) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_CRI03';
var CERT_KEY  = 'CERT_AED_AED_CRI03';
var BACK_URL  = 'index_PIX_AED.html';

var SCENARIOS = [
  {
    ctx: "Un \\u00e9l\\u00e8ve de 5\\u00e8me, Tom, vient vous trouver pendant la permanence et dit \\u00e0 voix basse : \\u00abIls me font des trucs sur le groupe Snap. Ils ont mis une photo de moi.\\u00bb Il est au bord des larmes.",
    q: "Quelle est votre premi\\u00e8re action ?",
    options: [
      {
        label: "\\u00c9couter + s\\u00e9curiser + transmettre",
        text: "Je l\\u2019\\u00e9coute sans couper. \\u00abMerci de me dire \\u00e7a, c\\u2019est courageux. Tu n\\u2019as rien fait de mal. Je vais en parler au CPE / au r\\u00e9f\\u00e9rent pHARe qui va t\\u2019aider.\\u00bb Je ne demande PAS \\u00e0 voir la photo. Je ne contacte PAS les auteurs. Je transmets imm\\u00e9diatement.",
        score: 3,
        fb: "R\\u00e8gle pHARe n\\u00b01 : \\u00e9couter et rassurer la victime. Ne jamais confronter auteur et victime. Ne pas enqu\\u00eater soi-m\\u00eame (risque de contamination des t\\u00e9moignages). Transmettre au r\\u00e9f\\u00e9rent pHARe ou au CPE qui active le protocole.",
        good: true
      },
      {
        label: "Enqu\\u00eater",
        text: "\\u00abMontre-moi le groupe, je veux voir ce qu\\u2019ils ont mis.\\u00bb",
        score: 1,
        fb: "L\\u2019envie de comprendre est naturelle, mais demander \\u00e0 voir le contenu peut retraumatiser la victime et compromettre la proc\\u00e9dure. Le r\\u00e9f\\u00e9rent pHARe a la m\\u00e9thode pour recueillir les preuves correctement.",
        good: false
      },
      {
        label: "Confronter les auteurs",
        text: "\\u00abQui a fait \\u00e7a ? Dis-moi les noms, je vais leur parler.\\u00bb",
        score: 0,
        fb: "Confronter les auteurs est la pire erreur : \\u00e7a les pr\\u00e9vient, \\u00e7a les pousse \\u00e0 effacer les preuves, et \\u00e7a peut aggraver le harc\\u00e8lement en repr\\u00e9sailles. Le protocole pHARe pr\\u00e9voit des entretiens individuels s\\u00e9par\\u00e9s men\\u00e9s par des adultes form\\u00e9s.",
        good: false
      },
    ]
  },
  {
    ctx: "Quelques jours plus tard, le r\\u00e9f\\u00e9rent pHARe a activ\\u00e9 le protocole. Les ambassadeurs pHARe (\\u00e9l\\u00e8ves form\\u00e9s) doivent maintenant surveiller discr\\u00e8tement la situation. Un ambassadeur vient vous voir : \\u00abIls continuent, mais en cachette.\\u00bb",
    q: "Que faites-vous de cette information ?",
    options: [
      {
        label: "Transmettre imm\\u00e9diatement au r\\u00e9f\\u00e9rent",
        text: "Je note les faits rapport\\u00e9s par l\\u2019ambassadeur (date, contexte, comportement observ\\u00e9) et je transmets au r\\u00e9f\\u00e9rent pHARe dans l\\u2019heure. L\\u2019ambassadeur est un relais d\\u2019information, pas un agent d\\u2019intervention.",
        score: 3,
        fb: "La cha\\u00eene de signalement pHARe passe par les adultes r\\u00e9f\\u00e9rents. L\\u2019ambassadeur observe et remonte, l\\u2019AED relaie et documente, le r\\u00e9f\\u00e9rent d\\u00e9cide de l\\u2019action. Personne ne court-circuite.",
        good: true
      },
      {
        label: "Demander \\u00e0 l\\u2019ambassadeur d\\u2019intervenir",
        text: "\\u00abEssaie de leur parler discr\\u00e8tement, entre \\u00e9l\\u00e8ves \\u00e7a passe mieux.\\u00bb",
        score: 0,
        fb: "L\\u2019ambassadeur pHARe n\\u2019est PAS un m\\u00e9diateur dans les situations de harc\\u00e8lement av\\u00e9r\\u00e9. Le harc\\u00e8lement n\\u2019est pas un conflit entre pairs \\u2014 c\\u2019est une asym\\u00e9trie de pouvoir. La m\\u00e9diation entre pairs ne fonctionne pas ici.",
        good: false
      },
      {
        label: "Attendre le prochain point pHARe",
        text: "\\u00abOn en reparle \\u00e0 la prochaine r\\u00e9union pHARe.\\u00bb",
        score: 1,
        fb: "La continuit\\u00e9 du harc\\u00e8lement malgr\\u00e9 le protocole est une urgence. Attendre une r\\u00e9union programm\\u00e9e, c\\u2019est laisser la situation se d\\u00e9grader. Transmission imm\\u00e9diate.",
        good: false
      },
    ]
  },
  {
    ctx: "Le parent de Tom vous aborde \\u00e0 la sortie : \\u00abMon fils est harcel\\u00e9 et personne ne fait rien ! Je veux des noms !\\u00bb",
    q: "Comment g\\u00e9rez-vous ce parent ?",
    options: [
      {
        label: "Accueillir + recadrer + orienter",
        text: "\\u00abJe comprends votre inqui\\u00e9tude, c\\u2019est l\\u00e9gitime. Le protocole pHARe est activ\\u00e9 et la situation est suivie activement. Je ne peux pas vous donner de noms \\u2014 c\\u2019est une proc\\u00e9dure qui prot\\u00e8ge aussi votre fils. Pour les d\\u00e9tails, je vous oriente vers le CPE ou le chef d\\u2019\\u00e9tablissement qui suit le dossier.\\u00bb",
        score: 3,
        fb: "L\\u2019AED n\\u2019a pas \\u00e0 communiquer des noms d\\u2019\\u00e9l\\u00e8ves ni des d\\u00e9tails de proc\\u00e9dure. Accueillir l\\u2019\\u00e9motion du parent, confirmer que la situation est prise en charge, et orienter vers le bon interlocuteur. C\\u2019est le cadre.",
        good: true
      },
      {
        label: "Donner des noms",
        text: "\\u00abC\\u2019est Untel et Untel qui font \\u00e7a.\\u00bb",
        score: 0,
        fb: "R\\u00e9v\\u00e9ler des noms \\u00e0 un parent en col\\u00e8re peut d\\u00e9clencher un conflit entre familles et compromettre le protocole. L\\u2019AED n\\u2019est pas habilit\\u00e9 \\u00e0 communiquer ces informations.",
        good: false
      },
      {
        label: "Se d\\u00e9fendre",
        text: "\\u00abMais on fait des choses ! C\\u2019est injuste de dire \\u00e7a !\\u00bb",
        score: 1,
        fb: "Se d\\u00e9fendre face \\u00e0 un parent en col\\u00e8re transforme l\\u2019\\u00e9change en confrontation. Le parent a besoin d\\u2019\\u00eatre entendu d\\u2019abord, inform\\u00e9 ensuite, orient\\u00e9 enfin.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"\u{1F4CB}", t:"Protocole pHARe \\u2014 AED :", v:"\\u00c9couter, rassurer, transmettre. Pas enqu\\u00eater, pas confronter, pas m\\u00e9dier."},
  {icon:"\u274C", t:"Jamais de confrontation :", v:"Harc\\u00e8lement \\u2260 conflit. Pas de m\\u00e9diation auteur/victime. Entretiens s\\u00e9par\\u00e9s par des adultes form\\u00e9s."},
  {icon:"\u{1F465}", t:"Ambassadeurs :", v:"Ils observent et remontent. Ils ne sont pas des m\\u00e9diateurs dans le harc\\u00e8lement av\\u00e9r\\u00e9."},
  {icon:"\u{1F4DE}", t:"Parents :", v:"Accueillir l\\u2019\\u00e9motion, confirmer la prise en charge, orienter vers CPE/chef. Pas de noms, pas de d\\u00e9tails."},
];


function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function awardXP(){
  try{
    var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : Protocole pHARe en situation',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){window.location.href=BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Gestion de Crise & M\u00e9diation \u00B7 Module 1/5'),
    e('h1',null,"Protocole pHARe en situation"),
    e('p',{className:'quote'},'"'+"Un protocole qui reste dans un classeur ne prot\\u00e8ge personne."+'" \u2014 R\\u00e9f\\u00e9rent pHARe'),
    e('p',null,"Le programme pHARe est le dispositif national de lutte contre le harc\\u00e8lement \\u00e0 l\\u2019\\u00e9cole. Il ne sert pas \\u00e0 avoir un classeur dans un bureau \\u2014 il sert quand un \\u00e9l\\u00e8ve vient vous dire \\u00abIls me font des trucs\\u00bb et que vous devez savoir exactement quoi faire."),
    e('p',null,"Ce module met en sc\\u00e8ne les situations r\\u00e9elles o\\u00f9 le protocole s\\u2019active : d\\u00e9tection, \\u00e9coute de la victime, non-confrontation des parties, signalement au r\\u00e9f\\u00e9rent, et s\\u00e9curisation. L\\u2019AED n\\u2019est pas le r\\u00e9f\\u00e9rent pHARe \\u2014 mais il est souvent le premier maillon."),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00e9f\u00e9rences : '),"Programme pHARe (MEN) \\u2014 Circulaire harc\\u00e8lement 2023 \\u2014 Guide acad\\u00e9mie de Besan\\u00e7on"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +100 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+pHARe'),e('div',{className:'comp-earn'},'+Signalement'),
      null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00e9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00e9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00e9e':'\u26A0\uFE0F Point d\u2019am\u00e9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00e9nario suivant \u2192':'Synth\u00e8se \u2192'))
    );
  };

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00e9tence solide.":pc>=50?"Des r\u00e9flexes \u00e0 affiner.":"\u00c0 retravailler.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00e8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'\u{1F4CB}'),
    e('h1',null,"Module valid\u00e9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00e9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +100 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 pHARe'),e('div',{className:'comp-earn'},'+1 Signalement'),
      null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00e0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
