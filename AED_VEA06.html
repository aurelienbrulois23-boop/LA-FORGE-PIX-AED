<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_VEA06 — Devenir architecte du vivre ensemble</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#22c55e;--acc-d:#16a34a;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.07) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--green);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#000;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.2);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#c4e8d0}
.insight-box strong{color:var(--green)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#22c55e;background:rgba(34,197,94,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
.badge-pillar{display:inline-block;padding:8px 18px;border:2px solid var(--acc);border-radius:30px;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--acc);text-transform:uppercase;letter-spacing:1px;margin:12px auto;display:block;text-align:center}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_VEA06';
var CERT_KEY  = 'CERT_AED_AED_VEA06';
var BACK_URL  = 'index.html';

var SCENARIOS = [
  {
    ctx: "Après avoir suivi les cinq modules du pilier Vivre Ensemble Actif, vous avez une conversation avec le CPE. Il vous demande : 'Concrètement, qu'est-ce que vous aimeriez mettre en place l'an prochain pour améliorer le climat dans les espaces de vie scolaire ?'",
    q: "Quelle est votre réponse ?",
    options: [
      {
        label: "Proposition ancrée et réaliste",
        text: "'Je voudrais proposer deux choses : un rituel de lancement de semaine en permanence (5 min, un mot par élève) et un tableau de valorisation collective dans l'espace de vie. Je peux les ancrer dans le CESC et les relier aux CPS si vous voulez une fiche de projet.'",
        score: 3,
        fb: "Une proposition concrète, double, ancrée institutionnellement, et accompagnée d'une offre de formalisation — c'est la posture de l'acteur proactif. Vous n'attendez plus qu'on vous dise quoi faire. Vous proposez, vous justifiez, vous offrez de structurer. C'est l'architecture du vivre ensemble en mode professionnel.",
        good: true
      },
      {
        label: "Idée vague",
        text: "'Je voudrais faire plus d'animations, créer une meilleure ambiance... je sais pas encore comment.'",
        score: 1,
        fb: "L'intention est bonne, mais l'imprécision l'affaiblit. Un CPE a besoin d'une proposition actionnable. Après cinq modules de formation, vous avez les outils pour être précis. La vaguerie ne protège pas — elle prive votre intention de poids institutionnel.",
        good: false
      },
      {
        label: "Attente de directives",
        text: "'Dites-moi ce que vous voulez que je fasse, je le ferai.'",
        score: 0,
        fb: "Attendre la directive, c'est renoncer à votre rôle d'acteur. L'architecte du vivre ensemble ne fait pas qu'exécuter — il propose, il observe, il ajuste. La formation que vous venez de faire a précisément pour objectif de vous outiller pour cette posture d'initiative.",
        good: false
      },
    ]
  },
  {
    ctx: "Vous souhaitez valoriser votre action dans les espaces de vie scolaire auprès de l'équipe éducative. Lors d'une réunion de vie scolaire, vous voulez rendre visible ce que vous faites en matière de développement des CPS.",
    q: "Comment procédez-vous ?",
    options: [
      {
        label: "Nommage précis et évaluation",
        text: "'Je présente ce que j'ai mis en place : le rituel du lundi (15 séances), la rotation des places en permanence, et la valorisation collective après les travaux de groupe. Je partage deux observations : les élèves les plus isolés se sont intégrés progressivement, et les tensions ont diminué en permanence. Ce n'est pas un ressenti — j'ai noté ces changements.'",
        score: 3,
        fb: "L'évaluation de son action est une compétence professionnelle à part entière. Observer, noter, partager — c'est rendre visible un travail souvent invisible. La crédibilité professionnelle de l'AED dans une équipe passe par cette capacité à nommer et à mesurer l'impact de son action.",
        good: true
      },
      {
        label: "Récit subjectif",
        text: "'Je sens que ça va mieux dans mes permanences. Les élèves sont plus calmes.'",
        score: 1,
        fb: "Le ressenti compte, mais ne suffit pas dans un cadre professionnel. Un ressenti non étayé peut être contesté ('c'est peut-être autre chose'). Associer observations précises et ressenti donne à votre discours une force que le ressenti seul ne peut pas avoir.",
        good: false
      },
      {
        label: "Ne pas en parler",
        text: "'Je ne mentionne pas — ça fait prétentieux et ce n'est pas mon rôle de faire des rapports.'",
        score: 0,
        fb: "Rendre visible son travail éducatif n'est pas de la prétention — c'est de la professionnalisation. Un AED qui n'informe jamais l'équipe de ce qu'il fait reste dans l'invisible, et perd des occasions de valoriser sa contribution et de créer des synergies avec les enseignants et le CPE.",
        good: false
      },
    ]
  },
  {
    ctx: "Un collègue AED vous demande : 'C'est quoi ta définition du bien-être à l'école ? Pour toi, en pratique, qu'est-ce que tu essaies de créer ?' C'est la première fois qu'on vous pose cette question.",
    q: "Que répondez-vous ?",
    options: [
      {
        label: "Synthèse personnelle cohérente",
        text: "'Pour moi, le bien-être à l'école c'est quand un élève se sent vu, capable, et relié aux autres. Je ne lutte pas contre les problèmes — j'essaie de créer les conditions pour que chacun puisse se sentir quelqu'un qui compte ici. C'est ça que j'essaie de faire chaque jour.'",
        score: 3,
        fb: "Une définition personnelle, claire, en trois axes (vu / capable / relié) — c'est l'expression d'une philosophie éducative intégrée. Ce n'est pas du jargon — c'est du sens. Un AED qui sait ce qu'il cherche à créer le crée plus sûrement. Vous avez parcouru un chemin réel.",
        good: true
      },
      {
        label: "Renvoi au texte",
        text: "'L'OMS dit que c'est les 10 CPS... enfin c'est ce qu'on m'a appris dans la formation.'",
        score: 1,
        fb: "Citer l'OMS est correct, mais ne répond pas à 'pour toi, en pratique'. La formation n'a de valeur que si elle devient pensée personnelle. Le passage du 'on m'a dit' au 'je pense' est la marque d'une formation intégrée — c'est ce qu'on cherche.",
        good: false
      },
      {
        label: "Esquive",
        text: "'C'est pas vraiment mon rôle de définir ça. Je suis là pour surveiller.'",
        score: 0,
        fb: "Cette esquive renvoie à une lecture limitée du rôle d'AED. La formation que vous venez de faire montre le contraire : l'AED est un acteur éducatif à part entière, avec une vision, des outils, et une posture. Surveiller est une mission — accompagner et contribuer au vivre ensemble en est une autre, complémentaire.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"🏛️", t:"L'architecte du vivre ensemble :", v:"Vous n'êtes pas exécutant. Vous observez, proposez, ajustez. Vous connaissez les cadres institutionnels. Vous avez des outils. Vous pouvez proposer des actions et les évaluer. C'est ça, un professionnel de la vie scolaire."},
  {icon:"📊", t:"Rendre visible son travail :", v:"Observer les changements, les nommer, les partager — c'est de la professionnalisation, pas de la vanité. La contribution de l'AED au climat scolaire est réelle. La rendre visible la rend aussi crédible et reproductible."},
  {icon:"🌱", t:"Du pilier à la culture :", v:"Un pilier Vivre Ensemble Actif ne change pas une école en un jour. Il change des pratiques individuelles, qui changent des dynamiques de groupe, qui modifient progressivement la culture de l'établissement. C'est le temps long de l'éducation."},
  {icon:"✨", t:"Ce que vous avez construit :", v:"En 6 modules, vous avez exploré les CPS, la connaissance de soi, l'empathie, la communication, la cohésion, et la posture proactive. Ce ne sont pas des cases cochées — ce sont des compétences vivantes. Elles se nourrissent de la pratique."},
];

function getPlayer(){try{var u=new URLSearchParams(window.location.search),p=u.get('player');if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);localStorage.setItem('pvs_aed_player',p);return p;}}catch(ex){}return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';}
function awardXP(){try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),module:MODULE_ID,cpTotal:0,label:"LA FORGE : Devenir architecte du vivre ensemble",d:new Date().toISOString()});if(evts.length>700)evts.splice(0,evts.length-700);localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));}catch(ex){}}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];
  var finish=function(){localStorage.setItem(CERT_KEY,JSON.stringify({v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true}));awardXP();setStep('complete');};
  var goBack=function(){var p=getPlayer();window.location.href=p&&p!=='anonyme'?BACK_URL+'?player='+encodeURIComponent(p):BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'✨ ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'← La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Vivre Ensemble Actif · Module 6/6 · Synthèse'),
    e('h1',null,"Devenir architecte du vivre ensemble"),
    e('p',{className:'quote'},'"'+"Il ne s'agit pas seulement d'éviter le pire. Il s'agit de construire activement le meilleur."+'" — Martin Seligman, La Force des émotions'),
    e('p',null,"Vous avez traversé cinq modules. Vous connaissez le cadre CPS, la connaissance de soi, l'empathie active, la communication constructive, et l'animation de la cohésion. Ce module final vous invite à intégrer tout cela dans une posture : celle de l'architecte du vivre ensemble."),
    e('p',null,"Un architecte ne réagit pas — il conçoit. Il observe, il propose, il ajuste. Il connaît les matériaux (les CPS), les règles de l'art (les cadres institutionnels), et la finalité (un espace où chaque élève se sent vu, capable, et relié). Ce module évalue votre capacité à habiter pleinement cette posture."),
    e('div',{className:'insight-box'},e('strong',null,'🎓 Module de synthèse — '),"Ce module valorise l'ensemble du parcours Vivre Ensemble Actif. Score renforcé, compétences de synthèse."),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},e('div',{className:'xp-badge'},'⚡ +120 XP'),e('span',{style:{margin:'0 6px'}}),e('div',{className:'comp-earn'},'+Synthèse'),e('div',{className:'comp-earn'},'+Leadership'),e('div',{className:'comp-earn'},'+Proactivité'),null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le scénario final')
  );};

  var renderScenario=function(){var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),e('div',{className:'step-tag'},'Scénario final '+(sIdx+1)+' / '+SCENARIOS.length),e('div',{className:'scenario-ctx'},e('strong',null,'📍 Contexte : '),sc.ctx),e('h2',null,sc.q),
      !feedback?sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,e('div',{className:'fb-box '+(feedback.good?'good':'warn')},e('strong',null,feedback.good?'✅ Posture d\'architecte':'⚠️ Point d\'intégration'),e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Scénario suivant →':'Synthèse finale →'))
    );};

  var renderSynthesis=function(){var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);var v=pc>=80?"Architecte confirmé(e).":pc>=50?"En chemin vers la posture.":"À consolider.";
    return e('div',{className:'card'},e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'95%'}})),e('div',{className:'step-tag'},'Synthèse finale'),e('h2',null,"Ce qu'il faut retenir"),e('div',{className:'insight-box'},e('strong',null,'🎯 Score : '),score+'/'+mx+' ('+pc+'%) — '+v),e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),e('button',{className:'btn',onClick:finish},'Finaliser le pilier Vivre Ensemble Actif →'));};

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'✨'),
    e('h1',null,"Pilier Vivre Ensemble Actif — Complété !"),
    e('div',{className:'badge-pillar'},'🌱 Architecte du Vivre Ensemble — La Forge'),
    e('p',{style:{textAlign:'center',marginTop:'12px'}},"Vous avez traversé les 6 modules du pilier Vivre Ensemble Actif. Vous portez maintenant une vision, des outils, et une posture. Le reste appartient à votre terrain."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'⚡ +120 XP · Pilier complet'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Synthèse'),e('div',{className:'comp-earn'},'+1 Leadership'),e('div',{className:'comp-earn'},'+1 Proactivité'),null),
    e('button',{className:'btn',onClick:goBack},'← Retour à La Forge')
  );};

  switch(step){case 'intro':return renderIntro();case 'scenario':return renderScenario();case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();default:return renderIntro();}
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
