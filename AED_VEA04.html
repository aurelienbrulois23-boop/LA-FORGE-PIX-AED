<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_VEA04 — La parole qui construit</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#22c55e;--acc-d:#16a34a;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.05) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--green);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#000;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#c4e8d0}
.insight-box strong{color:var(--green)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#22c55e;background:rgba(34,197,94,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_VEA04';
var CERT_KEY  = 'CERT_AED_AED_VEA04';
var BACK_URL  = 'index.html';

var SCENARIOS = [
  {
    ctx: "Noé, 6ème, a aidé spontanément un camarade tombé dans la cour. Vous avez vu la scène. C'est la première fois que vous observez ce geste chez lui — d'habitude, il a tendance à rester en retrait ou à provoquer.",
    q: "Comment valorisez-vous ce geste ?",
    options: [
      {
        label: "Feedback spécifique et sincère",
        text: "'Noé, j'ai vu ce que tu as fait tout à l'heure. Tu n'avais pas à le faire — et tu l'as fait quand même. C'est exactement ça, prendre soin de quelqu'un. J'ai apprécié.' (pas de note, pas de points, juste des mots)",
        score: 3,
        fb: "Le feedback positif efficace est spécifique (j'ai vu ce que tu as fait), sincère (pas de sur-enthousiasme forcé), et nommé (c'est exactement ça, prendre soin). Il reconnaît l'acte ET la personne. Les recherches de Hattie sur le feedback montrent que la précision et la sincérité valent 10 fois plus que les compliments génériques.",
        good: true
      },
      {
        label: "Valorisation publique",
        text: "'Regardez tous ! Noé a aidé son camarade ! Bravo Noé !' (devant le groupe)",
        score: 1,
        fb: "La valorisation publique peut embarrasser certains élèves et créer une pression de conformité. Elle peut aussi être vécue comme condescendante ('bravo d'avoir fait ce que tout le monde devrait faire'). Le feedback sincère et discret est souvent plus puissant pour les élèves qui ne cherchent pas à être exposés.",
        good: false
      },
      {
        label: "Récompense immédiate",
        text: "'Bien joué Noé, tu gagnes des XP pour ça.'",
        score: 1,
        fb: "La récompense extrinsèque seule ne suffit pas — et peut même réduire la motivation intrinsèque à long terme (effet de surjustification, Deci & Ryan). Associer la récompense à une reconnaissance verbale sincère et spécifique est plus puissant que la récompense seule.",
        good: false
      },
    ]
  },
  {
    ctx: "Un élève de 3ème vous demande, avec insistance, de lui autoriser de sortir plus tôt du self pour rejoindre des amis dans la cour. Vous n'avez pas l'autorisation de le faire — c'est contre les règles du service.",
    q: "Comment répondez-vous sans vous laisser déstabiliser ?",
    options: [
      {
        label: "Assertivité claire et bienveillante",
        text: "'Je comprends que tu veux rejoindre tes amis, c'est normal. Mais ce n'est pas de mon ressort — les règles du self s'appliquent à tout le monde, y compris quand ça ne nous arrange pas. Quand tu auras terminé, tu pourras les rejoindre.'",
        score: 3,
        fb: "L'assertivité, c'est exprimer un refus clairement, sans agressivité, ni justification excessive, ni fuite. Reconnaître le désir de l'élève ('je comprends') avant de maintenir la limite ('mais ce n'est pas de mon ressort') est la structure de l'assertivité bienveillante. Pas de culpabilité, pas de négociation, pas de dureté.",
        good: true
      },
      {
        label: "Négociation pour éviter le conflit",
        text: "'Bon, je fais une exception cette fois, mais tu me le dis pas.' (tout en sachant que c'est contre les règles)",
        score: 0,
        fb: "La négociation pour éviter le conflit fragilise le cadre et votre crédibilité. Si l'exception est connue, d'autres élèves feront la même demande. Et si elle n'est pas connue, vous avez créé une relation inégalitaire. L'assertivité protège la règle et votre posture professionnelle.",
        good: false
      },
      {
        label: "Refus sec",
        text: "'Non. C'est les règles.' (sans explication, ton ferme)",
        score: 1,
        fb: "Le refus sec est légal, mais pédagogiquement pauvre. Il ne développe pas la compréhension du cadre chez l'élève. L'assertivité bienveillante maintient la même fermeté, mais en nommant le besoin de l'élève ET la raison du cadre — ce qui renforce bien plus l'intériorisation des règles.",
        good: false
      },
    ]
  },
  {
    ctx: "Vous souhaitez demander à un groupe de 4èmes qui occupent le couloir de bien vouloir se déplacer vers la cour. Leur présence bloque le passage et ils sont bruyants. Vous avez déjà eu des tensions avec ce groupe.",
    q: "Comment formulez-vous votre demande ?",
    options: [
      {
        label: "Demande CNV (Communication Non-Violente)",
        text: "'Quand vous êtes dans ce couloir à cette heure-ci, le passage est bloqué pour tout le monde. J'aurais besoin que vous vous déplaciez vers la cour. Est-ce que vous pouvez le faire maintenant ?'",
        score: 3,
        fb: "La structure CNV (Rosenberg) : observation neutre ('quand vous êtes dans ce couloir') + impact ('le passage est bloqué') + besoin ('j'aurais besoin') + demande concrète ('est-ce que vous pouvez le faire maintenant ?'). Cette formulation évite les jugements, les accusations et les ordres — ce qui réduit la résistance et améliore la coopération.",
        good: true
      },
      {
        label: "Ordre direct",
        text: "'Dégagez le couloir maintenant.'",
        score: 0,
        fb: "L'ordre direct peut créer de la résistance, surtout avec un groupe déjà en tension. Il place la relation sur un mode hiérarchique pur, sans explication ni reconnaissance. Avec un groupe difficile, ça peut déclencher une confrontation inutile.",
        good: false
      },
      {
        label: "Demande floue",
        text: "'Vous pourriez pas vous mettre ailleurs ? C'est un peu gênant là...'",
        score: 1,
        fb: "La demande floue, hésitante, ouvre la porte à l'interprétation ('c'est pas obligatoire alors'). L'assertivité demande de la clarté : qu'est-ce qu'on observe, pourquoi c'est un problème, et ce qu'on demande concrètement. La bienveillance n'est pas l'imprécision.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"🎯", t:"Le feedback spécifique :", v:"Un compliment vague ('c'est bien') a moins d'impact qu'une reconnaissance précise ('j'ai vu que tu as fait X, et ça a eu l'effet Y'). La précision montre qu'on a vraiment vu — et c'est ce qui touche."},
  {icon:"🦁", t:"L'assertivité bienveillante :", v:"Ni agression, ni soumission. L'assertivité dit ce qui est, maintient le cadre, et reconnaît l'autre. C'est la posture la plus difficile à tenir — et la plus respectueuse, pour soi et pour l'élève."},
  {icon:"💬", t:"La CNV en pratique :", v:"Observation + impact + besoin + demande. Quatre étapes qui transforment une injonction en invitation à coopérer. La CNV ne supprime pas l'autorité — elle l'ancre dans la relation plutôt que dans le rapport de force."},
  {icon:"🔗", t:"La parole comme lien :", v:"Chaque échange bien construit avec un élève est un investissement dans la relation. La confiance se construit par des dizaines de petits échanges cohérents — pas par les grands discours."},
];

function getPlayer(){try{var u=new URLSearchParams(window.location.search),p=u.get('player');if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);localStorage.setItem('pvs_aed_player',p);return p;}}catch(ex){}return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';}
function awardXP(){try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),module:MODULE_ID,cpTotal:0,label:"LA FORGE : La parole qui construit",d:new Date().toISOString()});if(evts.length>700)evts.splice(0,evts.length-700);localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));}catch(ex){}}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];
  var finish=function(){localStorage.setItem(CERT_KEY,JSON.stringify({v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true}));awardXP();setStep('complete');};
  var goBack=function(){var p=getPlayer();window.location.href=p&&p!=='anonyme'?BACK_URL+'?player='+encodeURIComponent(p):BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'💬 ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'← La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Vivre Ensemble Actif · Module 4/6'),
    e('h1',null,"La parole qui construit"),
    e('p',{className:'quote'},'"'+"Les mots que nous choisissons construisent ou détruisent. Il y a plus de violence dans nos mots quotidiens que dans tous les conflits ouverts."+'" — Marshall B. Rosenberg'),
    e('p',null,"La communication est au cœur du travail éducatif. Mais pas n'importe quelle communication : celle qui reconnaît, qui cadre avec respect, qui demande sans ordonner. Ces techniques s'apprennent."),
    e('p',null,"Ce module explore trois compétences communicationnelles fondamentales pour l'AED : le feedback positif spécifique, l'assertivité bienveillante, et la demande en Communication Non-Violente (Rosenberg). Trois registres, une même conviction : la parole bien choisie construit le lien et le cadre simultanément."),
    e('div',{className:'insight-box'},e('strong',null,'📚 Références : '),"Marshall B. Rosenberg, Les mots sont des fenêtres — John Hattie, Visible Learning — Edward Deci & Richard Ryan, Self-Determination Theory"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},e('div',{className:'xp-badge'},'⚡ +100 XP'),e('span',{style:{margin:'0 6px'}}),e('div',{className:'comp-earn'},'+Communication'),e('div',{className:'comp-earn'},'+Assertivité'),null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le scénario')
  );};

  var renderScenario=function(){var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Scénario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'📍 Contexte : '),sc.ctx),e('h2',null,sc.q),
      !feedback?sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,e('div',{className:'fb-box '+(feedback.good?'good':'warn')},e('strong',null,feedback.good?'✅ Posture adaptée':'⚠️ Point d\'amélioration'),e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Scénario suivant →':'Synthèse →'))
    );};

  var renderSynthesis=function(){var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);var v=pc>=80?"Compétence solide.":pc>=50?"Des réflexes à affiner.":"À retravailler.";
    return e('div',{className:'card'},e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),e('div',{className:'step-tag'},'Synthèse'),e('h2',null,"Ce qu'il faut retenir"),e('div',{className:'insight-box'},e('strong',null,'🎯 Score : '),score+'/'+mx+' ('+pc+'%) — '+v),e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),e('button',{className:'btn',onClick:finish},'Valider ce module →'));};

  var renderComplete=function(){return e('div',{className:'card'},e('div',{className:'seal'},'💬'),e('h1',null,"Module validé !"),e('p',{style:{textAlign:'center'}},"Feedback, assertivité, CNV : trois outils de précision pour une parole qui respecte et qui construit."),e('div',{style:{textAlign:'center',margin:'10px 0'}},e('div',{className:'xp-badge'},'⚡ +100 XP'),e('span',{style:{margin:'0 6px'}}),e('div',{className:'comp-earn'},'+1 Communication'),e('div',{className:'comp-earn'},'+1 Assertivité'),null),e('button',{className:'btn',onClick:goBack},'← Retour à La Forge'));};

  switch(step){case 'intro':return renderIntro();case 'scenario':return renderScenario();case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();default:return renderIntro();}
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
