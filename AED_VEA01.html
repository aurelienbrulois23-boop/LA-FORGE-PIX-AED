<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_VEA01 — Le bien-être à l'école : de quoi parle-t-on ?</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#22c55e;--acc-d:#16a34a;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.05) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--green);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#000;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#c4e8d0}
.insight-box strong{color:var(--green)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#22c55e;background:rgba(34,197,94,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_VEA01';
var CERT_KEY  = 'CERT_AED_AED_VEA01';
var BACK_URL  = 'index.html';

var SCENARIOS = [
  {
    ctx: "Lors de la réunion de rentrée, le CPE annonce une nouvelle initiative 'Bien-être et CPS' portée par le CESC. Il demande aux AED de s'impliquer dans deux ateliers par trimestre. Certains collègues murmurent : 'Encore un truc de plus…'",
    q: "Quelle posture adoptez-vous ?",
    options: [
      {
        label: "Engagement institutionnel éclairé",
        text: "'Je peux participer. Et si on lisait d'abord le cadre de référence OMS sur les CPS ? Ça nous aidera à voir comment ça s'articule avec ce qu'on fait déjà au quotidien.'",
        score: 3,
        fb: "Les CPS (Compétences PsychoSociales) sont définies par l'OMS dès 1993 et relèvent en France du CESC (Comité d'Éducation à la Santé et à la Citoyenneté). Voir leur déploiement comme une extension de la posture éducative déjà portée par les AED est la lecture la plus juste — et la plus utile institutionnellement.",
        good: true
      },
      {
        label: "Refus passif",
        text: "'Je fais mon travail de surveillance, ces ateliers c'est pas dans ma fiche de poste.'",
        score: 0,
        fb: "La circulaire du 10/02/2004 et les missions de l'AED incluent explicitement 'l'animation éducative'. Les CPS s'inscrivent dans le parcours citoyen, qui relève bien de la vie scolaire. Refuser sans lire les textes, c'est passer à côté d'un levier professionnel réel.",
        good: false
      },
      {
        label: "Enthousiasme non-outillé",
        text: "'Je suis partant ! Je vais faire des jeux de rôle sur la confiance en soi, ça va être super.'",
        score: 1,
        fb: "L'élan est précieux, mais sans cadrage (référentiel CPS, articulation avec l'équipe, objectifs définis), le risque est de faire des animations sans ancrage éducatif. Le bien-être à l'école ne s'improvise pas — il se construit sur des bases solides.",
        good: false
      },
    ]
  },
  {
    ctx: "Un élève de 4ème vous dit spontanément : 'J'aime bien être à l'école cette année. Je sais pas pourquoi, mais je me sens bien.' Vous observez qu'il a rejoint le groupe de médiation par les pairs et qu'il s'est lié avec plusieurs camarades.",
    q: "Qu'est-ce qui explique principalement son bien-être ?",
    options: [
      {
        label: "Les CPS en action",
        text: "Il développe des compétences relationnelles (liens de qualité), sociales (appartenance au groupe) et intra-personnelles (conscience de soi). Ce sont exactement les 10 compétences psychosociales de l'OMS.",
        score: 3,
        fb: "Bravo. Le bien-être à l'école n'est pas un ressenti vague — il repose sur des compétences identifiables : conscience de soi, empathie, communication efficace, appartenance sociale. La médiation par les pairs est précisément un outil de développement des CPS. Vous avez vu juste.",
        good: true
      },
      {
        label: "La chance",
        text: "Il a eu de bons profs cette année et de bonnes notes, donc il se sent bien.",
        score: 1,
        fb: "Les résultats scolaires contribuent au bien-être, mais ne l'expliquent pas seuls. Des études montrent que le sentiment d'appartenance et la qualité des liens sont des prédicteurs plus forts du bien-être perçu que les notes. L'élève n'a pas mentionné ses notes — il a mentionné un sentiment.",
        good: false
      },
      {
        label: "La personnalité",
        text: "Certains élèves sont naturellement positifs, il fait partie de ceux-là.",
        score: 0,
        fb: "Attribuer le bien-être à la personnalité innée efface le rôle de l'environnement et des compétences apprises. Les CPS ne sont pas des traits de caractère fixes — elles se développent. C'est précisément pourquoi on les enseigne.",
        good: false
      },
    ]
  },
  {
    ctx: "Vous croisez une collègue AED dans la salle de repos. Elle dit : 'J'ai demandé au CPE d'intégrer un temps de cohésion en début de permanence le lundi, pour que les élèves démarrent la semaine autrement. Il m'a dit que c'était une bonne idée mais que je devais d'abord lui soumettre une fiche de projet avec les objectifs CPS visés.'",
    q: "Comment l'aidez-vous à rédiger ces objectifs ?",
    options: [
      {
        label: "Ancrage dans le référentiel",
        text: "'On part des 10 CPS de l'OMS : connaissance de soi, empathie, communication, résolution de problèmes, pensée critique, pensée créatrice, prise de décision, gestion du stress, des émotions, et relations positives. Pour un temps de cohésion en début de semaine, on peut viser : appartenance au groupe, communication, et conscience de soi.'",
        score: 3,
        fb: "Connaître le référentiel OMS des 10 CPS permet de légitimer toute action auprès de la hiérarchie. Ce n'est pas du jargon : c'est le langage institutionnel que le CPE, le chef d'établissement et les inspecteurs utilisent. Maîtriser ce langage donne du crédit à vos initiatives.",
        good: true
      },
      {
        label: "Improvisation",
        text: "'Dis-lui que c'est pour que les élèves aillent mieux, ça devrait suffire.'",
        score: 0,
        fb: "Institutionnellement, 'aller mieux' ne suffit pas. Un projet éducatif doit identifier des compétences visées, des modalités d'évaluation et un ancrage dans les textes (parcours citoyen, CESC, PAS). Vague, ça finit à la corbeille.",
        good: false
      },
      {
        label: "Scepticisme",
        text: "'S'il te demande une fiche de projet, c'est qu'il veut pas vraiment que tu le fasses.'",
        score: 0,
        fb: "La demande de fiche de projet est une procédure normale, pas un rejet déguisé. Toute action en établissement gagne à être formalisée : c'est ce qui permet d'évaluer, d'ajuster et de valoriser le travail accompli. La procédure est un allié, pas un obstacle.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"🌱", t:"Les CPS selon l'OMS :", v:"10 compétences psychosociales définies en 1993 : connaissance de soi, empathie, communication, relations positives, prise de décision, résolution de problèmes, pensée créatrice, pensée critique, gestion du stress, gestion des émotions."},
  {icon:"🏛️", t:"Le cadre institutionnel :", v:"CESC, parcours citoyen, PAS (Plan d'Accompagnement et de Soutien) — autant de leviers officiels pour porter les CPS dans un établissement. Ne pas les connaître, c'est se priver d'alliés."},
  {icon:"🤝", t:"Le rôle de l'AED :", v:"Les AED sont en contact prolongé avec les élèves hors temps de classe — le lieu précis où les CPS se vivent réellement. Cette proximité est une ressource éducative rare."},
  {icon:"📈", t:"Bien-être = compétences :", v:"Le bien-être à l'école n'est pas un état passif. C'est le résultat de compétences actives : appartenir, communiquer, se connaître, coopérer. On peut les développer — et les AED peuvent y contribuer."},
];

function getPlayer(){
  try{
    var u=new URLSearchParams(window.location.search),p=u.get('player');
    if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);localStorage.setItem('pvs_aed_player',p);return p;}
  }catch(ex){}
  return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';
}
function awardXP(){
  try{
    var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : Le bien-être à l\'école',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){
    var p=getPlayer();
    var sep=BACK_URL.indexOf('?')===-1?'?':'&';
    window.location.href=p&&p!=='anonyme'?BACK_URL+sep+'player='+encodeURIComponent(p):BACK_URL;
  };
  var PlayerChip=function(){return e('div',{className:'player-chip'},'🌱 ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'← La Forge'),PlayerChip()),
    e('div',{className:'tag'},'Vivre Ensemble Actif · Module 1/6'),
    e('h1',null,"Le bien-être à l'école : de quoi parle-t-on ?"),
    e('p',{className:'quote'},'"'+"Le bien-être ne s'obtient pas en supprimant ce qui va mal — il se construit en développant ce qui va bien."+'" — Martin Seligman, Positive Psychology'),
    e('p',null,"Le bien-être scolaire n'est pas un objectif flou. Depuis 1993, l'OMS a défini 10 Compétences PsychoSociales (CPS) précisément parce que ces compétences — apprises et entraînées — déterminent la santé mentale, la réussite et la qualité de vie des jeunes."),
    e('p',null,"En France, ces CPS s'inscrivent dans des dispositifs institutionnels concrets : le CESC, le parcours citoyen, le PAS. Les AED, par leur présence continue dans les espaces de vie scolaire, sont des acteurs privilégiés de ce développement. Ce module vous donne les clés pour comprendre ce cadre et vous y positionner."),
    e('div',{className:'insight-box'},e('strong',null,'📚 Références : '),"OMS (1993), Life Skills Education for Children and Adolescents in Schools — DGESCO (2016), Référentiel de compétences psychosociales — Eduscol, Parcours citoyen"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'⚡ +80 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Bien-être'),e('div',{className:'comp-earn'},'+Compréhension'),
      null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le scénario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Scénario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'📍 Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'✅ Posture adaptée':'⚠️ Point d\'amélioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Scénario suivant →':'Synthèse →'))
    );
  };

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Compétence solide.":pc>=50?"Des réflexes à affiner.":"À retravailler.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synthèse'),e('h2',null,"Ce qu'il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'🎯 Score : '),score+'/'+mx+' ('+pc+'%) — '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module →')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'🌱'),
    e('h1',null,"Module validé !"),
    e('p',{style:{textAlign:'center'}},"Vous connaissez maintenant le socle institutionnel des CPS. Bienvenue dans la construction active du bien-être scolaire."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'⚡ +80 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Bien-être'),e('div',{className:'comp-earn'},'+1 Compréhension'),
      null),
    e('button',{className:'btn',onClick:goBack},'← Retour à La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
