<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_DET05 \u2014 Construire une fiche d\u2019observation</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#8b5cf6;--acc-d:#6d28d9;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(139,92,246,.06) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_DET05';
var CERT_KEY  = 'CERT_AED_AED_DET05';
var BACK_URL  = 'index_PIX_AED.html';

var SCENARIOS = [
  {
    ctx: "Vous observez la sc\\u00e8ne suivante : \\u00e0 la cantine, trois \\u00e9l\\u00e8ves de 4\\u00e8me se l\\u00e8vent syst\\u00e9matiquement quand Nadia s\\u2019assoit \\u00e0 leur table. Nadia reste seule. Vous voulez documenter.",
    q: "Quelle formulation est correcte pour la fiche ?",
    options: [
      {
        label: "Formulation factuelle",
        text: "\\u00ab12/03, 12h20, cantine. X, Y, Z (4\\u00e8meB) se sont lev\\u00e9s quand Nadia (4\\u00e8meB) s\\u2019est assise \\u00e0 leur table. Nadia est rest\\u00e9e seule. C\\u2019est la 3\\u00e8me fois cette semaine (dates pr\\u00e9c\\u00e9dentes : 10/03, 11/03). Aucun mot \\u00e9chang\\u00e9 audible.\\u00bb",
        score: 3,
        fb: "Fiche mod\\u00e8le : date, heure, lieu, noms, comportement observable, r\\u00e9currence chiffr\\u00e9e, absence d\\u2019\\u00e9l\\u00e9ment (\\u00abaucun mot audible\\u00bb). Pas d\\u2019interpr\\u00e9tation, pas de jugement. Le CPE peut travailler avec \\u00e7a.",
        good: true
      },
      {
        label: "Formulation interpr\\u00e9tative",
        text: "\\u00abNadia est exclue par X, Y, Z qui la rejettent m\\u00e9chamment \\u00e0 la cantine. C\\u2019est clairement du harc\\u00e8lement.\\u00bb",
        score: 0,
        fb: "\\u00abRejettent m\\u00e9chamment\\u00bb est une interpr\\u00e9tation (vous ne connaissez pas l\\u2019intention). \\u00abClairement du harc\\u00e8lement\\u00bb est un diagnostic que l\\u2019AED n\\u2019a pas \\u00e0 poser. Les faits suffisent \\u2014 et ils parlent d\\u2019eux-m\\u00eames.",
        good: false
      },
      {
        label: "Formulation vague",
        text: "\\u00abNadia a des probl\\u00e8mes avec des filles de sa classe \\u00e0 la cantine.\\u00bb",
        score: 1,
        fb: "Trop vague pour \\u00eatre exploitable. Qui ? Quand ? Quel comportement pr\\u00e9cis\\u00e9ment ? Le CPE ne peut rien faire avec \\u00abdes probl\\u00e8mes\\u00bb. Les faits pr\\u00e9cis sont la mati\\u00e8re premi\\u00e8re du signalement.",
        good: false
      },
    ]
  },
  {
    ctx: "Le CPE vous demande un retour \\u00e9crit sur Sofiane (4\\u00e8me), que vous surveillez depuis 2 semaines pour suspicion de d\\u00e9crochage.",
    q: "Comment structurez-vous votre fiche de synth\\u00e8se ?",
    options: [
      {
        label: "Chronologique + factuelle + sans conclusion",
        text: "\\u00abSemaine 1 : Retards 3/03 (15min), 4/03 (10min), 6/03 (20min). Absent cantine 3/03, 5/03. Dort en \\u00e9tude 4/03, 6/03. Semaine 2 : Retards quotidiens (10-20min). Ne mange plus \\u00e0 la cantine depuis lundi 10/03. S\\u2019isole en cour. Interaction observ\\u00e9e avec un groupe ext\\u00e9rieur au portail 11/03 (3 individus non identifi\\u00e9s, visiblement plus \\u00e2g\\u00e9s). Note : aucune interpr\\u00e9tation. \\u00c0 croiser avec donn\\u00e9es enseignants.\\u00bb",
        score: 3,
        fb: "Fiche mod\\u00e8le : chronologique, dat\\u00e9e, factuelle, et se termine par \\u00abaucune interpr\\u00e9tation\\u00bb \\u2014 ce qui est la marque d\\u2019un professionnel. L\\u2019observation du groupe ext\\u00e9rieur est un \\u00e9l\\u00e9ment que seul l\\u2019AED au portail peut noter.",
        good: true
      },
      {
        label: "R\\u00e9sum\\u00e9 impressionniste",
        text: "\\u00abSofiane va mal. Il arrive en retard, il mange plus, il tra\\u00eene avec des gens bizarres dehors.\\u00bb",
        score: 1,
        fb: "\\u00abVa mal\\u00bb = interpr\\u00e9tation. \\u00abGens bizarres\\u00bb = jugement. La fiche doit contenir des faits chiffr\\u00e9s et dat\\u00e9s, pas des impressions. Le CPE a besoin de mat\\u00e9riau dur.",
        good: false
      },
      {
        label: "Diagnostic",
        text: "\\u00abSofiane est en d\\u00e9crochage scolaire avanc\\u00e9, probablement li\\u00e9 \\u00e0 des fr\\u00e9quentations ext\\u00e9rieures.\\u00bb",
        score: 0,
        fb: "L\\u2019AED observe, il ne diagnostique pas. \\u00abProbablement li\\u00e9 \\u00e0\\u00bb est une hypoth\\u00e8se \\u2014 pas un fait. Le CPE, l\\u2019AS et les enseignants croiseront les donn\\u00e9es et poseront le diagnostic.",
        good: false
      },
    ]
  },
  {
    ctx: "Un coll\\u00e8gue AED vous dit : \\u00abJ\\u2019\\u00e9cris rien, j\\u2019ai pas le temps. Je dis les trucs \\u00e0 l\\u2019oral au CPE et c\\u2019est bon.\\u00bb",
    q: "Pourquoi l\\u2019\\u00e9crit est-il indispensable ?",
    options: [
      {
        label: "3 raisons concr\\u00e8tes",
        text: "\\u00ab1. La m\\u00e9moire d\\u00e9forme : dans 3 jours, tu auras oubli\\u00e9 les dates et m\\u00e9lang\\u00e9 les situations. 2. L\\u2019\\u00e9crit est transmissible : si tu es absent, personne ne sait ce que tu as vu. 3. L\\u2019\\u00e9crit prot\\u00e8ge : en cas de plainte, d\\u2019enqu\\u00eate ou de proc\\u00e9dure, seul l\\u2019\\u00e9crit dat\\u00e9 fait foi. L\\u2019oral ne vaut rien devant un juge.\\u00bb",
        score: 3,
        fb: "Trois arguments imparables : fiabilit\\u00e9 (contre la d\\u00e9formation m\\u00e9morielle), transmissibilit\\u00e9 (continuit\\u00e9 du suivi), et protection juridique (en cas de proc\\u00e9dure, seul l\\u2019\\u00e9crit dat\\u00e9 a valeur probante).",
        good: true
      },
      {
        label: "Argument moral",
        text: "\\u00abC\\u2019est notre devoir professionnel d\\u2019\\u00e9crire.\\u00bb",
        score: 1,
        fb: "Vrai mais peu convaincant. Les arguments concrets (m\\u00e9moire, transmissibilit\\u00e9, protection juridique) parlent plus qu\\u2019un rappel au devoir.",
        good: false
      },
      {
        label: "Laisser tomber",
        text: "\\u00abC\\u2019est vrai, l\\u2019oral suffit si le CPE est r\\u00e9actif.\\u00bb",
        score: 0,
        fb: "L\\u2019oral ne laisse aucune trace. Si le CPE est absent, malade, muta\\u00e9 \\u2014 l\\u2019information dispara\\u00eet. Et en cas de proc\\u00e9dure, \\u00abje l\\u2019ai dit \\u00e0 l\\u2019oral\\u00bb ne vaut rien.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"\u{1F4CB}", t:"Fait vs interpr\\u00e9tation :", v:"\\u00abIl est rejet\\u00e9\\u00bb = interpr\\u00e9tation. \\u00abX, Y, Z se l\\u00e8vent quand Nadia s\\u2019assoit\\u00bb = fait. Seuls les faits sont exploitables."},
  {icon:"\u{1F4C5}", t:"Dater + chiffrer :", v:"Dates, heures, fr\\u00e9quence. \\u00ab3 retards en 5 jours\\u00bb vaut plus que \\u00abil est souvent en retard\\u00bb."},
  {icon:"\u270D\uFE0F", t:"\\u00c9crire :", v:"La m\\u00e9moire d\\u00e9forme, l\\u2019oral dispara\\u00eet, seul l\\u2019\\u00e9crit dat\\u00e9 fait foi. 30 secondes d\\u2019\\u00e9criture peuvent changer une proc\\u00e9dure."},
  {icon:"\u274C", t:"Ne pas diagnostiquer :", v:"L\\u2019AED observe et transmet. Le diagnostic appartient au CPE, \\u00e0 l\\u2019AS, au m\\u00e9decin. Les faits suffisent."},
];


function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function awardXP(){
  try{
    var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : Construire une fiche d\\u2019observation',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){window.location.href=BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},'D\u00e9tection & Signaux Faibles \u2014 CERTIFICATION \u00B7 Module 1/5'),
    e('h1',null,"Construire une fiche d\\u2019observation"),
    e('p',{className:'quote'},'"'+"Ce qui n\\u2019est pas \\u00e9crit n\\u2019existe pas. Ce qui est mal \\u00e9crit nuit."+'" \u2014 Principe de documentation professionnelle'),
    e('p',null,"L\\u2019AED observe des dizaines de situations par jour. Sans fiche, ces observations se perdent dans la m\\u00e9moire \\u00e9motionnelle \\u2014 d\\u00e9form\\u00e9es, simplifi\\u00e9es, parfois fabul\\u00e9es. La fiche d\\u2019observation transforme des impressions en donn\\u00e9es exploitables."),
    e('p',null,"Ce module de certification vous apprend \\u00e0 r\\u00e9diger une observation factuelle : distinguer fait et interpr\\u00e9tation, noter les verbatims, dater et contextualiser, et transmettre sans alourdir. C\\u2019est l\\u2019outil de base du d\\u00e9tecteur professionnel."),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00e9f\u00e9rences : '),"M\\u00e9thodologie d\\u2019observation \\u2014 Protocole pHARe (documentation) \\u2014 Guide AED acad\\u00e9mie de Besan\\u00e7on"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +120 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Observation'),e('div',{className:'comp-earn'},'+Transmission'),
      null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00e9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00e9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00e9e':'\u26A0\uFE0F Point d\u2019am\u00e9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00e9nario suivant \u2192':'Synth\u00e8se \u2192'))
    );
  };

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00e9tence solide.":pc>=50?"Des r\u00e9flexes \u00e0 affiner.":"\u00c0 retravailler.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00e8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'\u{1F4CB}'),
    e('h1',null,"Module valid\u00e9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00e9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +120 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Observation'),e('div',{className:'comp-earn'},'+1 Transmission'),
      null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00e0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
