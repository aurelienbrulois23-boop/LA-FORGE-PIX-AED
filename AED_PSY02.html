<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_PSY02 — Les biais cognitifs qui nous aveuglent</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#3b82f6;--acc-d:#1d4ed8;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,#3b82f622 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_PSY02';
var CERT_KEY  = 'CERT_AED_AED_PSY02';
var BACK_URL  = 'index.html';

var INTRO = {
  "pillar": "Santé Psychique · Module 2/5",
  "pos": "Lucidité professionnelle",
  "title": "Les biais cognitifs qui nous aveuglent",
  "quote": "Ce n'est pas ce que nous ne savons pas qui nous met en difficulté. C'est ce que nous croyons savoir avec certitude et qui ne l'est pas.",
  "p1": "Nos cerveaux fonctionnent par raccourcis — c'est ce qui nous permet de traiter l'information d'une journée entière sans s'effondrer. Mais ces raccourcis ont un coût : ils créent des angles morts. Certains biais cognitifs reviennent systématiquement dans le travail avec les adolescents et font passer des élèves en souffrance entre les mailles.",
  "p2": "Ce module vous expose à quatre biais documentés : la normalisation progressive, le biais de genre, le biais de performance scolaire, et le biais de familiarité. Les reconnaître, c'est se donner les moyens de les corriger.",
  "refs": "Daniel Kahneman, Thinking Fast and Slow — Santé publique France, ENCLASS 2022 (disparités de genre) — HAS, Manifestations dépressives à l'adolescence — Cyrulnik, Les Vilains Petits Canards"
};

var SCENARIOS = [
  {
    "ctx": "Sofiane (4e) est passé d'un élève souriant à un élève renfermé sur plusieurs mois. La transformation a été si progressive que personne dans l'équipe ne l'a notée. Aujourd'hui, l'infirmière sonne l'alarme après une consultation. La collègue AED dit : 'Oui, mais il a toujours été un peu comme ça...'",
    "q": "Quel biais cognitif identifiez-vous dans la réaction de votre collègue ?",
    "options": [
      {
        "label": "Le biais de normalisation",
        "text": "C'est le biais de normalisation : le changement a été si progressif que chaque étape, prise isolément, semblait anodine. L'équipe s'est adaptée à la nouvelle réalité sans la questionner. Le résultat : une situation préoccupante est devenue 'normale'.",
        "score": 3,
        "fb": "Exact. Le biais de normalisation est un des plus courants dans les équipes éducatives. Le cerveau humain s'adapte aux changements progressifs — c'est une fonction de survie. Mais dans le suivi des élèves, elle devient un angle mort. L'outil de correction : la note factuelle datée, qui rend la progression visible en comparant 'il y a deux mois' à 'aujourd'hui'.",
        "good": true
      },
      {
        "label": "Le biais de confirmation",
        "text": "C'est le biais de confirmation : la collègue cherche des informations qui confirment ce qu'elle croit déjà savoir.",
        "score": 1,
        "fb": "Pas tout à fait — le biais de confirmation existe dans ce cas, mais le mécanisme principal ici est la normalisation progressive : l'équipe ne confirmait pas une croyance, elle s'habituait à une réalité qui avait changé imperceptiblement. La clé est la progressivité du changement.",
        "good": false
      },
      {
        "label": "Une erreur de communication",
        "text": "Ce n'est pas un biais, c'est simplement un manque de communication entre membres de l'équipe.",
        "score": 0,
        "fb": "La communication est effectivement un levier d'amélioration, mais le problème de fond est cognitif : personne ne 'voyait' le problème, même individuellement. Améliorer la communication ne corrige pas le biais de normalisation — il faut des outils spécifiques : grilles d'observation, réunions de bilan régulières, notes datées.",
        "good": false
      }
    ]
  },
  {
    "ctx": "Mathieu (3e) multiplie les accrochages depuis deux mois : il provoque ses camarades, répond mal aux adultes, a été convoqué trois fois. Emma (même classe) s'est, elle, retirée progressivement : elle ne parle plus en cours, mange seule, a l'air absente. L'équipe se concentre surtout sur Mathieu 'qui pose problème'.",
    "q": "Quel risque voyez-vous dans la répartition de l'attention de l'équipe ?",
    "options": [
      {
        "label": "Le biais de genre — Emma passe entre les mailles",
        "text": "L'équipe est captée par un comportement externalisé et visible (Mathieu). Mais le comportement d'Emma — internalisé, discret — est tout aussi préoccupant et possiblement plus urgent. Le biais de genre fait que la souffrance exprimée par l'agression retient davantage l'attention que la souffrance exprimée par le retrait.",
        "score": 3,
        "fb": "C'est précisément ça. La recherche montre que les garçons tendent à externaliser la souffrance (agression, transgression) et les filles à l'internaliser (retrait, automutilation, TCA). Les comportements externalisés déclenchent des réponses institutionnelles immédiates. Les comportements internalisés passent souvent inaperçus — et c'est là que le risque est le plus élevé. Mathieu mérite attention, mais Emma aussi.",
        "good": true
      },
      {
        "label": "Mathieu est clairement la priorité",
        "text": "Mathieu crée du désordre qui affecte toute la classe. Il est normal de se concentrer sur le problème le plus visible.",
        "score": 0,
        "fb": "La visibilité d'un problème n'est pas un indicateur de sa gravité. Un élève qui transgresse crée du désordre gérable. Un élève qui s'effondre silencieusement peut être en danger réel. Les deux situations méritent une attention parallèle.",
        "good": false
      },
      {
        "label": "C'est un problème d'effectif — on ne peut pas tout suivre",
        "text": "Avec 400 élèves et une petite équipe, on ne peut pas s'occuper de tout le monde également.",
        "score": 1,
        "fb": "La contrainte est réelle, mais elle ne justifie pas de laisser passer des signaux préoccupants. L'enjeu n'est pas de suivre tout le monde également — c'est d'avoir des outils pour que certains profils 'silencieux' ne soient pas systématiquement perdus au profit des profils 'bruyants'.",
        "good": false
      }
    ]
  },
  {
    "ctx": "Jade (2nde professionnelle, 15 ans) est une des meilleures élèves de sa promo. Elle est impliquée dans les conseils de classe, toujours souriante avec l'équipe. Un soir, sa mère appelle l'établissement : Jade a été hospitalisée après une tentative de suicide. L'équipe est sous le choc : 'On n'a rien vu venir.'",
    "q": "Quel(s) biais ont pu contribuer à cette situation ?",
    "options": [
      {
        "label": "Biais de performance + biais de familiarité",
        "text": "Deux biais conjugués : le biais de performance ('elle réussit, donc elle va bien') et le biais de familiarité ('on la connaît bien, on saurait si quelque chose allait mal'). Le brillant anxieux utilise souvent la performance scolaire comme unique espace de contrôle — et le masque social comme protection.",
        "score": 3,
        "fb": "Exact. La recherche sur le perfectionnisme adolescent montre que certains élèves maintiennent d'excellents résultats tout en vivant une souffrance psychique intense — précisément parce que la performance est leur seul levier d'estime de soi. La familiarité crée une fausse sécurité : on croit voir parce qu'on reconnaît, mais on ne voit pas ce qui est nouveau. La question 'comment tu vas, toi ?' — pas tes notes, pas tes projets, toi — est parfois la seule qu'on n'a jamais posée.",
        "good": true
      },
      {
        "label": "Une situation imprévisible par nature",
        "text": "Certains passages à l'acte sont impossibles à anticiper. Ce n'est la faute de personne.",
        "score": 1,
        "fb": "Il est vrai que aucun professionnel ne peut tout prévoir, et la culpabilisation de l'équipe n'est pas productive. Cependant, la recherche montre que dans de nombreux cas, des signaux existaient — mais des biais cognitifs ont empêché de les voir. L'objectif n'est pas de culpabiliser, mais d'apprendre à mieux regarder.",
        "good": false
      },
      {
        "label": "Un défaut de formation de l'équipe",
        "text": "L'équipe n'avait pas été formée à repérer ces signaux.",
        "score": 0,
        "fb": "La formation est un levier important — et c'est exactement l'objet de ce module. Mais la formation seule ne suffit pas si elle ne s'attaque pas aux biais cognitifs qui structurent la perception. Connaître les signaux ne sert à rien si le biais de performance m'empêche de les chercher chez les bons élèves.",
        "good": false
      }
    ]
  }
];

var SYNTHESIS = [
  {
    "icon": "🔄",
    "t": "Biais de normalisation :",
    "v": "Le changement progressif devient invisible. Outil de correction : la note factuelle datée."
  },
  {
    "icon": "⚤",
    "t": "Biais de genre :",
    "v": "L'agression retient l'attention. Le retrait passe. Les deux peuvent signaler une même souffrance."
  },
  {
    "icon": "🏆",
    "t": "Biais de performance :",
    "v": "Bonnes notes ≠ aller bien. Le brillant anxieux est un profil à risque invisible."
  },
  {
    "icon": "🤝",
    "t": "Biais de familiarité :",
    "v": "'Je le connais' peut créer une fausse sécurité. La question 'comment tu vas, toi ?' reste souvent non posée."
  }
];


function getPlayer(){
  try{var u=new URLSearchParams(window.location.search),p=u.get('player');
    if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);localStorage.setItem('pvs_aed_player',p);return p;}}catch(ex){}
  return localStorage.getItem('pvs_current_player')||localStorage.getItem('pvs_aed_player')||'anonyme';
}
function awardXP(){
  try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : Les biais cognitifs qui nous aveuglent',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){
    var p=getPlayer(),sep=BACK_URL.indexOf('?')===-1?'?':'&';
    window.location.href=(p&&p!=='anonyme')?BACK_URL+sep+'player='+encodeURIComponent(p):BACK_URL;
  };
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},INTRO.pillar+' \u00B7 '+INTRO.pos),
    e('h1',null,INTRO.title),
    e('p',{className:'quote'},'"'+INTRO.quote+'"'),
    e('p',null,INTRO.p1),
    e('p',null,INTRO.p2),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00E9f\u00E9rences : '),INTRO.refs),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +90 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+Lucidité'),e('div',{className:'comp-earn'},'+Repérage'),null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00E9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00E9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00E9e':'\u26A0\uFE0F Point d\u2019am\u00E9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00E9nario suivant \u2192':'Synth\u00E8se \u2192'))
    );};

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00E9tence solide.":pc>=50?"Des r\u00E9flexes \u00E0 affiner.":"\u00C0 retravailler en \u00E9quipe.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00E8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );};

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'🧠'),
    e('h1',null,"Module valid\u00E9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00E9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +90 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 Lucidité professionnelle'),e('div',{className:'comp-earn'},'+1 Repérage'),null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00E0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
